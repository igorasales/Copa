    function bindMatchCards() {
      document.querySelectorAll("[data-match-id]").forEach(card => {
        card.addEventListener("click", event => {
          const teamTarget = event.target.closest("[data-team-key]");
          if (teamTarget) {
            event.stopPropagation();
            openTeamModal(teamTarget.getAttribute("data-team-key"));
            return;
          }
          state.selectedMatchId = card.getAttribute("data-match-id");
          renderBracket();
          renderGroups();
          renderMatches();
          renderDetail();
        });
      });
      document.querySelectorAll("[data-save-score]").forEach(button => {
        button.addEventListener("click", () => {
          const number = button.getAttribute("data-save-score");
          const panel = document.querySelector(`[data-score-editor="${number}"]`);
          const home = Number(panel?.querySelector('[data-score-side="home"]')?.value);
          const away = Number(panel?.querySelector('[data-score-side="away"]')?.value);
          if (Number.isFinite(home) && Number.isFinite(away) && home >= 0 && away >= 0) {
            state.simScores[number] = { home, away };
            saveSimScores();
            if (state.mode === "live") setMode("sim");
            render();
          }
        });
      });
      document.querySelectorAll("[data-clear-score]").forEach(button => {
        button.addEventListener("click", () => {
          delete state.simScores[button.getAttribute("data-clear-score")];
          saveSimScores();
          render();
        });
      });

    function findMatchById(id) {
      const data = state.viewData || state.data;
      if (!data || !id) return null;
      return data.allMatches.find(match => match.id === id)
        || data.knockout.flatMap(round => round.matches).find(match => match.id === id);
    }

    function matchMatchesQuery(match, query) {
      if (!query) return true;
      return normalize([
        match.stage,
        match.home.name,
        match.home.sourceName,
        match.away.name,
        match.away.sourceName,
        match.venue,
        match.score,
        match.label
      ].join(" ")).includes(query);
    }

    function normalize(value) {
      return (value || "").toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    }

    function dayKey(timestamp) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: BR_TZ,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(new Date(timestamp));
    }

    function flagImg(src, alt) {
      return src
        ? `<img class="flag" src="${escapeAttr(src)}" alt="${escapeAttr(alt)}" loading="lazy" />`
        : `<span class="flag" aria-hidden="true"></span>`;
    }

    function teamFlag(team) {
      const attrs = teamAttrs(team);
      const flag = flagImg(team?.flag, team?.name || "");
      return attrs ? `<span class="flag-click" ${attrs}>${flag}</span>` : flag;
    }

    function teamCrest(team) {
      const cached = state.badgeCache.get(String(team?.idTeam || normalize(team?.name || "")));
      const fallback = team?.flag || "";
      const src = cached || fallback;
      return `
        <div class="team-crest" ${teamAttrs(team)} title="Abrir selecao">
          ${src ? `<img data-team-badge="${escapeAttr(team?.idTeam || normalize(team?.name || ""))}" src="${escapeAttr(src)}" alt="${escapeAttr(team?.name || "")}" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='${escapeAttr(fallback)}'" />` : `<span class="flag" aria-hidden="true"></span>`}
        </div>
      `;
    }

    async function loadTeamBadge(team) {
      const key = String(team?.idTeam || normalize(team?.name || ""));
      if (!key || state.badgeCache.has(key)) return;
      try {
        let hit = null;
        for (const search of teamBadgeQueries(team)) {
          const url = `https://commons.wikimedia.org/w/api.php?action=query&origin=*&format=json&generator=search&gsrsearch=${encodeURIComponent(search)}&gsrlimit=12&prop=imageinfo&iiprop=url&iiurlwidth=220`;
          const response = await fetch(url, { cache: "force-cache" });
          if (!response.ok) continue;
          const pages = Object.values((await response.json())?.query?.pages || {});
          hit = pickTeamBadgeHit(pages);
          if (hit) break;
        }
        if (!hit) return;
        state.badgeCache.set(key, hit.url);
        const selectorKey = window.CSS?.escape ? CSS.escape(key) : key.replace(/"/g, '\\"');
        document.querySelectorAll(`[data-team-badge="${selectorKey}"]`).forEach(img => { img.src = hit.url; });
      } catch {}
    }

    function teamBadgeQueries(team) {
      const names = uniqueValues([
        team?.sourceName,
        team?.name,
        TEAM_NAMES_PT[team?.sourceName || ""],
        team?.idCountry
      ].filter(Boolean));
      return names.flatMap(name => [
        `${name} national football team logo`,
        `${name} football federation logo`,
        `${name} football association crest`,
        `${name} soccer federation logo`
      ]).slice(0, 12);
    }

    function pickTeamBadgeHit(pages) {
      return pages
        .map(page => ({
          title: page.title || "",
          url: page.imageinfo?.[0]?.thumburl || page.imageinfo?.[0]?.url || ""
        }))
        .map(item => ({ ...item, score: teamBadgeScore(item) }))
        .filter(item => item.url && item.score > 0)
        .sort((a, b) => b.score - a.score)[0] || null;
    }

    function teamBadgeScore(item) {
      const title = item.title.toLowerCase();
      if (/flag|map|kit|jersey|shirt|uniform|location|banner|supporters/.test(title)) return 0;
      let score = 1;
      if (/logo|crest|badge|emblem/.test(title)) score += 5;
      if (/football association|federation|national football team|soccer federation/.test(title)) score += 4;
      if (/svg|png/.test(title)) score += 1;
      if (/women|u-17|u-20|olympic|futsal|beach/.test(title)) score -= 3;
      return score;
    }

    function confederationForTeam(team) {
      const code = (team?.idCountry || "").toUpperCase();
      return CONFEDERATION_BY_COUNTRY[code] || "";
    }

    function confedCrest(team) {
      const confed = confederationForTeam(team);
      if (!confed) return `<div class="confed-crest"><span>FIFA<small>federação</small></span></div>`;
      const logo = CONFEDERATION_LOGOS[confed] || "";
      return `<div class="confed-crest" title="${escapeAttr(CONFEDERATION_LABELS[confed] || confed)}">${logo ? `<img class="confed-logo" src="${escapeAttr(logo)}" alt="${escapeAttr(confed)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'" />` : ""}<span>${escapeHtml(confed)}<small>${escapeHtml((CONFEDERATION_LABELS[confed] || "").split(" ")[0] || "confed")}</small></span></div>`;
    }

    function teamAttrs(team) {
      if (!team?.name || /A definir|Grupo|Jogo/.test(team.name)) return "";
      const key = team.idTeam || normalize(team.name);
      return `data-team-key="${escapeAttr(key)}" title="Abrir elenco de ${escapeAttr(team.name)}"`;
    }

    function escapeHtml(value) {
      return (value ?? "").toString().replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function switchView(view) {
      state.activeView = view;
      document.querySelectorAll(".view").forEach(panel => panel.classList.toggle("active", panel.id === `view-${view}`));
      document.querySelectorAll("[data-view-button]").forEach(button => button.setAttribute("aria-selected", String(button.dataset.viewButton === view)));
      if (view === "model" && state.mode !== "model") setMode("model");
    }

    function setMode(mode) {
      state.mode = mode;
      render();
    }

    function updateModeButtons() {
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.setAttribute("aria-pressed", String(button.dataset.mode === state.mode));
      });
    }

    function runProjection() {
      if (state.mode === "live") state.mode = "model";
      render();
    }

    function clearSimulation() {
      state.simScores = {};
      saveSimScores();
      render();
    }

    function saveManualScore(number) {
      const panel = document.querySelector(`[data-score-editor="${number}"]`);
      const home = Number(panel?.querySelector('[data-score-side="home"]')?.value);
      const away = Number(panel?.querySelector('[data-score-side="away"]')?.value);
      if (Number.isFinite(home) && Number.isFinite(away) && home >= 0 && away >= 0) {
        state.simScores[number] = { home, away };
        saveSimScores();
        if (state.mode === "live") state.mode = "sim";
        render();
      }
    }

    function syncActiveScoreEditor() {
      const active = document.activeElement;
      if (!active?.matches?.("[data-score-side]")) return;
      const panel = active.closest("[data-score-editor]");
      const number = panel?.getAttribute("data-score-editor");
      if (!number) return;
      const home = Number(panel.querySelector('[data-score-side="home"]')?.value);
      const away = Number(panel.querySelector('[data-score-side="away"]')?.value);
      if (!Number.isFinite(home) || !Number.isFinite(away) || home < 0 || away < 0) return;
      const current = state.simScores[number];
      if (current && current.home === home && current.away === away) return;
      state.simScores[number] = { home, away };
      saveSimScores();
      window.clearTimeout(state.scoreRenderTimer);
      state.scoreRenderTimer = window.setTimeout(render, 500);
    }

    function applyZoom() {
      if (!els.bracketCanvas) return;
      els.bracketCanvas.style.transform = `scale(${state.zoom})`;
      els.bracketCanvas.style.width = `${1356 * state.zoom}px`;
      els.bracketCanvas.style.height = `${2620 * state.zoom}px`;
      els.zoomLabel.textContent = `${Math.round(state.zoom * 100)}%`;
      window.requestAnimationFrame(drawBracketLines);
    }

    function changeZoom(delta) {
      state.zoom = Math.max(.45, Math.min(1.5, Number((state.zoom + delta).toFixed(2))));
      applyZoom();
    }

    function fitBracket() {
      const width = els.bracketViewport?.clientWidth || 1200;
      state.zoom = Math.max(.45, Math.min(1, Number(((width - 26) / 1356).toFixed(2))));
      applyZoom();
      els.bracketViewport.scrollTo({ left: 0, top: 0, behavior: "smooth" });
    }

    function setupBracketDrag() {
      const viewport = els.bracketViewport;
      if (!viewport) return;
      let active = false;
      let startX = 0;
      let startY = 0;
      let scrollLeft = 0;
      let scrollTop = 0;
      viewport.addEventListener("pointerdown", event => {
        if (event.target.closest("button, input, select, a")) return;
        active = true;
        startX = event.clientX;
        startY = event.clientY;
        scrollLeft = viewport.scrollLeft;
        scrollTop = viewport.scrollTop;
        viewport.classList.add("dragging");
        viewport.setPointerCapture(event.pointerId);
      });
      viewport.addEventListener("pointermove", event => {
        if (!active) return;
        viewport.scrollLeft = scrollLeft - (event.clientX - startX);
        viewport.scrollTop = scrollTop - (event.clientY - startY);
      });
      const stop = event => {
        active = false;
        viewport.classList.remove("dragging");
        try { viewport.releasePointerCapture(event.pointerId); } catch {}
      };
      viewport.addEventListener("pointerup", stop);
      viewport.addEventListener("pointercancel", stop);
      viewport.addEventListener("wheel", event => {
        if (!event.ctrlKey) return;
        event.preventDefault();
        changeZoom(event.deltaY > 0 ? -.05 : .05);
      }, { passive: false });
    }

    function renderModel() {
      if (!els.modelGrid || !state.viewData) return;
      const data = state.viewData;
      const ratings = Object.values(data.ratings || {}).sort((a, b) => b.score - a.score);
      const future = data.knockout.flatMap(round => round.matches)
        .filter(match => match.projected === "model")
        .slice(0, 12);
      els.modelGrid.innerHTML = `
        <section class="rating-panel">
          <h3>Força das seleções</h3>
          <div class="rating-list">
            ${ratings.slice(0, 48).map(team => `
              <div class="rating-row">
                <span class="team-cell">${teamFlag(team)} <strong class="team-name" ${teamAttrs(team)}>${escapeHtml(team.name)}</strong></span>
                <strong>${team.score}</strong>
                <div class="rating-bar"><span style="width:${Math.max(8, team.score)}%"></span></div>
                <span>Ataque ${team.attack}</span>
                <span>Defesa ${team.defense}</span>
                <span>Conf. ${team.confidence || "-"}%</span>
                <span>Moral ${team.moral || "-"}</span>
                <span>Sinergia ${teamSynergyValue(team)} (${teamSynergyLabel(team)})</span>
                ${renderTeamFactors(team)}
              </div>
            `).join("")}
          </div>
        </section>
        <section class="model-panel">
          <h3>Próximas projeções</h3>
          <div class="projection-list">
            ${future.length ? future.map(match => matchCard(match)).join("") : `<div class="empty">Entre no modo estatística e clique em Projetar.</div>`}
          </div>
        </section>
      `;
      bindMatchCards();
    }

    function renderTeamFactors(team) {
      const components = team.components || {};
      const rows = [
        ["Base", components.base || team.externalPower || 50],
        ["Elenco", components.squad || team.squadScore || 50],
        ["Forma", components.form || team.formScore || 50],
        ["Moral", components.moral || team.moral || 50],
        ["Sinergia", components.synergy || teamSynergyValue(team)]
      ];
      return `
        <div class="factor-list">
          ${rows.map(([label, value]) => `
            <div class="factor-row">
              <span>${escapeHtml(label)}</span>
              <span class="factor-bar"><span style="width:${Math.max(5, Math.min(100, Number(value) || 0))}%"></span></span>
              <strong>${escapeHtml(value)}</strong>
            </div>
          `).join("")}
        </div>
      `;
    }

    function teamSynergyValue(team) {
      const value = Number(team?.squadSynergy);
      if (Number.isFinite(value) && value > 0) return Math.round(value);
      return estimatedTeamSynergy(team || {});
    }

    function teamSynergyLabel(team) {
      const value = teamSynergyValue(team);
      if (value >= 72) return "alta";
      if (value >= 58) return "boa";
      if (value >= 46) return "media";
      return "baixa";
    }

    async function openTeamModal(key) {
      const team = state.teamIndex.get(String(key)) || state.teamIndex.get(normalize(String(key)));
      if (!team) return;
      els.teamModal.hidden = false;
      els.teamModalBody.innerHTML = `<div class="team-modal-head">${flagImg(team.flag, team.name)}<div><h2 id="teamModalTitle">${escapeHtml(team.name)}</h2><p class="detail-label">Carregando elenco FIFA...</p></div></div>`;
      let squad = state.squadCache.get(String(team.idTeam));
      if (!squad && team.idTeam) {
        try {
          const response = await fetch(FIFA_SQUAD_URL.replace("{id}", encodeURIComponent(team.idTeam)), { cache: "no-store" });
          if (response.ok) {
            squad = await response.json();
            state.squadCache.set(String(team.idTeam), squad);
            state.viewData = buildViewData();
          }
        } catch {}
      }
      await loadFifaPlayerStats();
      if (Array.isArray(squad?.Players)) mergeFifaStatsIntoPlayers(squad.Players);
      renderTeamModal(team, squad);
    }

    function renderTeamModal(team, squad) {
      const players = Array.isArray(squad?.Players) ? squad.Players : [];
      const rating = (state.viewData?.ratings || state.data?.ratings || {})[normalize(team.name)] || {};
      const teamId = team.idTeam || normalize(team.name);
      state.currentModal = { team, squad };
      const lineup = likelyLineup(players, teamId);
      const lineupIds = new Set(lineup.map(player => String(player.IdPlayer)));
      const model = squadModel(players, teamId);
      const sortedPlayers = sortPlayersForLineup(players, lineupIds);
      players.sort((a, b) => sortedPlayers.indexOf(a) - sortedPlayers.indexOf(b));
      const formation = formationForTeam(teamId);
      const impact = lineupImpact(players, teamId);
      const selectedSlot = state.selectedLineupSlot?.teamId === String(teamId) ? Number(state.selectedLineupSlot.slot) : null;
      const selectedRole = Number.isInteger(selectedSlot) ? roleLabel(formationSlots(teamId)[selectedSlot]?.[0]) : "";
      players.forEach(player => {
        if (player?.IdPlayer) state.playerCache.set(String(player.IdPlayer), { ...player, teamName: team.name, teamFlag: team.flag });
      });
      els.teamModalBody.innerHTML = `
        <div class="team-modal-head">
          <div class="team-identities">
            ${teamCrest(team)}
            ${confedCrest(team)}
          </div>
          <div>
            <h2 id="teamModalTitle">${escapeHtml(team.name)}</h2>

    function sortPlayersForLineup(players, lineupIds) {
      return [...(players || [])].sort((a, b) => {
        const aSelected = lineupIds.has(String(a.IdPlayer)) ? 0 : 1;
        const bSelected = lineupIds.has(String(b.IdPlayer)) ? 0 : 1;
        if (aSelected !== bSelected) return aSelected - bSelected;
        return playerAttributes(b).overall - playerAttributes(a).overall;
      });
    }

    function teamModelCell(label, value) {
      return `<div class="team-model-cell"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
    }

    function likelyLineup(players, teamId = "") {
      return lineupForTeam(players, teamId);
    }

    function formationForTeam(teamId = "") {
      return state.lineupFormations[String(teamId)] || "4-3-3";
    }

    function formationSlots(teamId = "") {
      return FORMATION_DEFS[formationForTeam(teamId)]?.slots || FORMATION_DEFS["4-3-3"].slots;
    }

    function roleLabel(role) {
      return {
        gk: "Goleiro",
        def: "Defesa",
        mid: "Meio",
        fwd: "Ataque"
      }[role] || "Meio";
    }

    function defaultLineup(players, formation = "4-3-3") {
      const slots = FORMATION_DEFS[formation]?.slots || FORMATION_DEFS["4-3-3"].slots;
      const groups = {
        gk: players.filter(player => positionRole(player) === "gk").sort((a, b) => playerAttributes(b).overall - playerAttributes(a).overall),
        def: players.filter(player => positionRole(player) === "def").sort((a, b) => playerAttributes(b).overall - playerAttributes(a).overall),
        mid: players.filter(player => positionRole(player) === "mid").sort((a, b) => playerAttributes(b).overall - playerAttributes(a).overall),
        fwd: players.filter(player => positionRole(player) === "fwd").sort((a, b) => playerAttributes(b).overall - playerAttributes(a).overall)
      };
      const picked = [];
      slots.forEach(([role]) => {
        const player = groups[role]?.shift();
        if (player) picked.push(player);
      });
      const used = new Set(picked.map(player => String(player.IdPlayer)));
      const fallback = players
        .filter(player => !used.has(String(player.IdPlayer)))
        .sort((a, b) => playerAttributes(b).overall - playerAttributes(a).overall);
      return [...picked, ...fallback].slice(0, 11);
    }

    function lineupForTeam(players, teamId = "") {
      const ids = state.lineupSelections[String(teamId)];
      if (Array.isArray(ids) && ids.length) {
        const byId = new Map((players || []).map(player => [String(player.IdPlayer), player]));
        const selected = ids.map(id => byId.get(String(id))).filter(Boolean);
        if (selected.length >= 8) return selected.slice(0, 11);
      }
      const base = defaultLineup(players || [], formationForTeam(teamId));
      if (teamId && base.length) {
        state.lineupSelections[String(teamId)] = base.map(player => String(player.IdPlayer));
      }
      return base;
    }

    function replaceLineupPlayer(teamId, playerId, preferredSlot = null) {
      const modal = state.currentModal;
      const players = Array.isArray(modal?.squad?.Players) ? modal.squad.Players : [];
      if (!players.length) return;
      const ids = lineupForTeam(players, teamId).map(player => String(player.IdPlayer));
      if (ids.includes(String(playerId))) return;
      const player = players.find(item => String(item.IdPlayer) === String(playerId));
      if (!player) return;
      let slot = Number.isInteger(preferredSlot) ? preferredSlot : -1;
      if (slot < 0 || slot >= ids.length) {
        const role = positionRole(player);
        slot = ids.findIndex(id => positionRole(players.find(item => String(item.IdPlayer) === id)) === role);
      }
      if (slot < 0) slot = ids.length - 1;
      ids[slot] = String(playerId);
      state.lineupSelections[String(teamId)] = ids.slice(0, 11);
      saveLineupSelections();
      state.viewData = buildViewData();
      render();
      renderTeamModal(modal.team, modal.squad);
    }

    function playerDot(player, index, teamId = "") {
      const slots = formationSlots(teamId);
      const saved = state.lineupPlans[String(teamId)]?.[String(player.IdPlayer)];
      const slot = slots[index] || ["mid", 50, 50];
      const [x, y] = saved ? [Number(saved.x) || 50, Number(saved.y) || 50] : [slot[1], slot[2]];
      const name = playerShortName(player);
      const active = state.selectedLineupSlot?.teamId === String(teamId) && state.selectedLineupSlot?.slot === index ? " active" : "";
      return `<button class="player-dot${active}" type="button" draggable="true" title="${escapeAttr(roleLabel(slot[0]))}: clique para abrir ficha ou arraste para mudar a funcao" data-player-id="${escapeAttr(player.IdPlayer || "")}" data-lineup-player="${escapeAttr(player.IdPlayer || "")}" data-lineup-slot="${index}" style="left:${x}%;top:${y}%"><strong>${escapeHtml(player.JerseyNum || index + 1)}</strong><span>${escapeHtml(name)}</span></button>`;
    }

    function legacyPlayerCard(player) {
      const name = localizedDescription(player.ShortName) || localizedDescription(player.PlayerName);
      const position = localizedDescription(player.PositionLocalized) || "-";
      const height = player.Height ? `${Math.round(player.Height)} cm` : "-";
      const fifaStats = fifaStatsForPlayer(player) || {};
      const goals = fifaStats.goals ?? player.Goals ?? "-";
      const assists = fifaStats.assists ?? player.Assists ?? "-";
      const yellows = player.YellowCards ?? "-";
      const reds = player.RedCards ?? "-";
      return `
        <div class="player-card">
          <strong>${escapeHtml(player.JerseyNum ? `${player.JerseyNum} · ${name}` : name)}</strong>
          <span>${escapeHtml(position)} · ${height}</span>
          <span>Gols ${goals} · Assist. ${assists} · Amarelos ${yellows} · Vermelhos ${reds}</span>
          <span>Minutos ${statValue(fifaStats.time_played ?? player.MinutesPlayed)} · Dist. ${formatDistance(fifaStats.total_distance ?? player.TotalDistance)}</span>
        </div>
      `;
    }

    function playerCard(player, teamId = "", selected = false, lineup = []) {
      const name = playerFullName(player);
      const shortName = playerShortName(player);
      const position = playerPosition(player);
      const height = player.Height ? `${Math.round(player.Height)} cm` : "-";
      const age = playerAge(player);
      const fifaStats = fifaStatsForPlayer(player) || {};
      const goals = statValue(fifaStats.goals ?? player.Goals);
      const assists = statValue(fifaStats.assists ?? player.Assists);
      const minutes = statValue(fifaStats.time_played ?? player.MinutesPlayed);
      const distance = formatDistance(fifaStats.total_distance ?? player.TotalDistance);
      const yellows = statValue(player.YellowCards);
      const reds = statValue(player.RedCards);
      const attrs = playerAttributes(player);
      const photo = playerPhoto(player);
      const fact = playerFact(player);
      const role = roleLabel(attrs.role);
      const modalPlayers = Array.isArray(state.currentModal?.squad?.Players) ? state.currentModal.squad.Players : [];
      const currentLineup = lineup.length ? lineup : lineupForTeam(modalPlayers, teamId);
      return `
        <article class="player-card${selected ? " selected" : ""}" data-player-id="${escapeAttr(player.IdPlayer || "")}" ${selected ? "" : `draggable="true" data-drag-sub-player="${escapeAttr(player.IdPlayer || "")}" data-drag-sub-team="${escapeAttr(teamId)}"`}>
          <button class="player-photo-button" type="button" data-photo-url="${escapeAttr(photo)}" data-photo-name="${escapeAttr(name)}">
            ${photo ? `<img class="player-photo" src="${escapeAttr(photo)}" alt="${escapeAttr(name)}" loading="lazy" />` : `<span class="player-photo placeholder">${escapeHtml((shortName || name).slice(0, 1))}</span>`}
          </button>
          <span class="player-card-main">
            <strong>${escapeHtml(player.JerseyNum ? `${player.JerseyNum} - ${name}` : name)}</strong>
            <span>${escapeHtml(shortName !== name ? `${shortName} - ${position}` : position)} - ${escapeHtml(role)} - ${height}${age ? ` - ${age} anos` : ""}</span>
            <span>${escapeHtml(fact?.club ? `${fact.club}${fact.clubCountry ? ` (${fact.clubCountry})` : ""}` : "Clube: buscando dados")}</span>
            <span>GER ${attrs.overall} - MOR ${attrs.moral} - ATA ${attrs.attack} - DEF ${attrs.defense}</span>
            <span>FIFA 2026: gols ${goals} - assis. ${assists} - min ${minutes} - dist ${distance}</span>
            <span>Cartoes: amarelos ${yellows} - vermelhos ${reds}${fact ? ` | Sel.: ${fact.caps} jogos, ${fact.nationalGoals} gols` : ""}</span>
            ${selected ? `<span>Titular atual</span>` : `
              <label class="replace-control">Entrar no lugar de
                <select data-replace-slot-for="${escapeAttr(player.IdPlayer || "")}">
                  ${currentLineup.map((starter, index) => `<option value="${index}">${escapeHtml(`${index + 1}. ${playerShortName(starter)} - ${roleLabel(positionRole(starter))}`)}</option>`).join("")}
                </select>
              </label>
              <button class="sub-button" type="button" data-sub-player="${escapeAttr(player.IdPlayer || "")}" data-sub-team="${escapeAttr(teamId)}">Substituir</button>
            `}
          </span>
        </article>
      `;
    }

    function statValue(value) {
      return value === null || value === undefined || value === "" ? "sem dado FIFA" : value;
    }

    function formatDistance(value) {
      const number = Number(value);
      if (!Number.isFinite(number) || number <= 0) return "sem dado FIFA";
      return number >= 1000 ? `${(number / 1000).toFixed(1).replace(".", ",")} km` : `${Math.round(number)} m`;
    }

    function renderPlayerDetail(playerId) {
      const player = state.playerCache.get(String(playerId));
      const box = document.getElementById("playerDetail");
      if (!player || !box) return;
      const name = playerFullName(player);

      const fact = playerFact(player);
      const fifaStats = fifaStatsForPlayer(player) || {};
      box.innerHTML = `
        <div class="player-detail">
          ${photo ? `<button class="player-photo-button" type="button" data-photo-url="${escapeAttr(photo)}" data-photo-name="${escapeAttr(name)}"><img class="player-photo" src="${escapeAttr(photo)}" alt="${escapeAttr(name)}" loading="lazy" /></button>` : `<span class="player-photo placeholder">${escapeHtml((shortName || name).slice(0, 1))}</span>`}
          <div>

              ${playerAttribute("Disciplina", attrs.discipline)}
              ${playerAttribute("Goleiro", attrs.goalkeeping)}
              ${playerAttribute("Moral", attrs.moral)}
            </div>
            <p class="detail-label">Camisa ${escapeHtml(player.JerseyNum || "-")} - Idade ${escapeHtml(age || "-")} - Altura ${escapeHtml(player.Height ? `${Math.round(player.Height)} cm` : "-")} - Peso ${escapeHtml(player.Weight ? `${Math.round(player.Weight)} kg` : "-")}</p>
            <p class="detail-label">${escapeHtml(fact?.club ? `Clube: ${fact.club}${fact.clubCountry ? ` (${fact.clubCountry})` : ""}` : "Clube: ainda sem cruzamento no indice de elencos")} - Seleção: ${escapeHtml(fact ? `${fact.caps} jogos, ${fact.nationalGoals} gols` : "-")}</p>
            <p class="detail-label">FIFA 2026: gols ${escapeHtml(statValue(fifaStats.goals ?? player.Goals))} - assistencias ${escapeHtml(statValue(fifaStats.assists ?? player.Assists))} - finalizacoes ${escapeHtml(statValue(fifaStats.attempt_at_goal ?? player.AttemptsAtGoal))} - passes ${escapeHtml(statValue(fifaStats.passes ?? player.Passes))} - minutos ${escapeHtml(statValue(fifaStats.time_played ?? player.MinutesPlayed))} - distancia ${escapeHtml(formatDistance(fifaStats.total_distance ?? player.TotalDistance))}.</p>
            <p class="detail-label">Cartoes: amarelos ${escapeHtml(statValue(player.YellowCards))} - vermelhos ${escapeHtml(statValue(player.RedCards))}.</p>
            <p class="detail-label">${escapeHtml(playerContext(player, attrs, fact))}</p>
          </div>
        </div>
      `;
    }

    function playerContext(player, attrs, fact) {
      const role = {
        gk: "seguranca defensiva",
        def: "protecao da area e saida curta",
        mid: "controle de ritmo e criacao",
        fwd: "profundidade e finalizacao"
      }[attrs.role] || "equilibrio tatico";
      const experience = fact?.caps ? `${fact.caps} jogos pela selecao` : "experiencia internacional limitada no indice";
      const club = fact?.club ? `atua por ${fact.club}` : "sem clube cruzado na fonte de elencos";
      return `Contexto: ${club}; ${experience}; moral ${attrs.moral}. No modelo, pesa principalmente em ${role}.`;
    }

    function playerAttribute(label, value) {
      return `<div class="player-attribute"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
    }

    document.querySelectorAll("[data-view-button]").forEach(button => {
      button.addEventListener("click", () => switchView(button.dataset.viewButton));
    });

    window.openTeamModal = openTeamModal;
    window.saveManualScore = saveManualScore;
    window.saveSimScores = saveSimScores;
    window.render = render;
    window.state = state;

    document.addEventListener("click", event => {
      const youtubeTarget = event.target.closest("[data-youtube-url]");
      if (youtubeTarget) {
        event.preventDefault();
        event.stopPropagation();
        window.open(youtubeTarget.getAttribute("data-youtube-url"), "_blank", "noopener");
        return;
      }
      const photoTarget = event.target.closest("[data-photo-url]");
      if (photoTarget) {
        const url = photoTarget.getAttribute("data-photo-url");
        if (url) {
          event.preventDefault();
          event.stopPropagation();
          openPhotoLightbox(url, photoTarget.getAttribute("data-photo-name") || "Jogador");
          return;
        }
      }
      const subButton = event.target.closest("[data-sub-player]");
      if (subButton) {
        event.preventDefault();
        event.stopPropagation();
        const teamId = subButton.getAttribute("data-sub-team");
        const playerId = subButton.getAttribute("data-sub-player");
        const slotSelect = document.querySelector(`[data-replace-slot-for="${playerId}"]`);
        const selectedSlot = slotSelect ? Number(slotSelect.value) : null;
        const slot = Number.isInteger(selectedSlot)
          ? selectedSlot
          : (state.selectedLineupSlot?.teamId === String(teamId) ? state.selectedLineupSlot.slot : null);
        replaceLineupPlayer(teamId, playerId, slot);
        return;
      }
      const resetLineup = event.target.closest("[data-reset-lineup]");
      if (resetLineup) {
        const teamId = resetLineup.getAttribute("data-reset-lineup");
        delete state.lineupSelections[String(teamId)];
        state.selectedLineupSlot = null;
        saveLineupSelections();
        if (state.currentModal) renderTeamModal(state.currentModal.team, state.currentModal.squad);
        render();
        return;
      }
      const playerButton = event.target.closest("[data-player-id]");
      if (playerButton) {
        if (lineupDrag?.moved) {
          lineupDrag = null;
          return;
        }
        event.preventDefault();
        const lineupDot = event.target.closest("[data-lineup-player]");
        if (lineupDot) {
          const pitch = lineupDot.closest("[data-lineup-team]");
          state.selectedLineupSlot = {
            teamId: pitch?.getAttribute("data-lineup-team") || "",
            slot: Number(lineupDot.getAttribute("data-lineup-slot")) || 0
          };
          document.querySelectorAll(".player-dot.active").forEach(dot => dot.classList.remove("active"));
          lineupDot.classList.add("active");
        }
        renderPlayerDetail(playerButton.getAttribute("data-player-id"));
        return;
      }
      const teamTarget = event.target.closest("[data-team-key]");
      if (teamTarget && !event.target.closest("[data-match-id]")) {
        event.preventDefault();
        openTeamModal(teamTarget.getAttribute("data-team-key"));
        return;
      }
      const modeButton = event.target.closest("[data-mode]");
      if (modeButton) setMode(modeButton.dataset.mode);
      const saveButton = event.target.closest("[data-save-score]");
      if (saveButton) {
        saveManualScore(saveButton.getAttribute("data-save-score"));
      }
      const clearButton = event.target.closest("[data-clear-score]");
      if (clearButton) {
        delete state.simScores[clearButton.getAttribute("data-clear-score")];
        saveSimScores();
        render();
      }
    });

    function openPhotoLightbox(url, name) {
      els.photoLightboxImg.src = url;
      els.photoLightboxImg.alt = name || "";
      els.photoLightboxCaption.textContent = name || "";
      els.photoLightbox.hidden = false;
    }

    function closePhotoLightbox() {
      els.photoLightbox.hidden = true;
      els.photoLightboxImg.src = "";
    }

    document.addEventListener("dragstart", event => {
      const card = event.target.closest("[data-drag-sub-player]");
      if (!card) return;
      benchDrag = {
        teamId: card.getAttribute("data-drag-sub-team"),
        playerId: card.getAttribute("data-drag-sub-player")
      };
      event.dataTransfer?.setData("text/plain", benchDrag.playerId);
      event.dataTransfer?.setDragImage?.(card, 20, 20);
    });

    document.addEventListener("dragover", event => {
      if (!benchDrag || !event.target.closest("[data-lineup-player]")) return;
      event.preventDefault();
    });

    document.addEventListener("drop", event => {
      const dot = event.target.closest("[data-lineup-player]");
      if (!benchDrag || !dot) return;
      event.preventDefault();
      const pitch = dot.closest("[data-lineup-team]");
      const teamId = pitch?.getAttribute("data-lineup-team") || benchDrag.teamId;
      const slot = Number(dot.getAttribute("data-lineup-slot")) || 0;
      replaceLineupPlayer(teamId, benchDrag.playerId, slot);
      benchDrag = null;
    });

    document.addEventListener("dragend", () => {
      benchDrag = null;
    });

    document.addEventListener("pointerdown", event => {
      const dot = event.target.closest("[data-lineup-player]");
      const pitch = dot?.closest("[data-lineup-team]");
      if (!dot || !pitch) return;
      lineupDrag = {
        dot,
        pitch,
        teamId: pitch.getAttribute("data-lineup-team"),
        playerId: dot.getAttribute("data-lineup-player"),
        moved: false
      };
      dot.classList.add("dragging");
      dot.setPointerCapture?.(event.pointerId);
    });

    document.addEventListener("pointermove", event => {
      if (!lineupDrag) return;
      const rect = lineupDrag.pitch.getBoundingClientRect();
      const x = Math.max(6, Math.min(94, ((event.clientX - rect.left) / rect.width) * 100));
      const y = Math.max(6, Math.min(94, ((event.clientY - rect.top) / rect.height) * 100));
      lineupDrag.dot.style.left = `${x}%`;
      lineupDrag.dot.style.top = `${y}%`;
      lineupDrag.x = Math.round(x);
      lineupDrag.y = Math.round(y);
      lineupDrag.moved = true;
    });

    document.addEventListener("pointerup", () => {
      if (!lineupDrag) return;
      lineupDrag.dot.classList.remove("dragging");
      if (lineupDrag.moved) {
        state.lineupPlans[lineupDrag.teamId] = state.lineupPlans[lineupDrag.teamId] || {};
        state.lineupPlans[lineupDrag.teamId][lineupDrag.playerId] = { x: lineupDrag.x, y: lineupDrag.y };
        saveLineupPlans();
        state.viewData = buildViewData();
        render();
        if (state.currentModal) renderTeamModal(state.currentModal.team, state.currentModal.squad);
      }
      setTimeout(() => { lineupDrag = null; }, 0);
    });
    document.addEventListener("change", event => {
      const formationInput = event.target.closest("[data-formation-team]");
      if (formationInput) {
        const teamId = formationInput.getAttribute("data-formation-team");
        state.lineupFormations[String(teamId)] = formationInput.value;
        delete state.lineupSelections[String(teamId)];
        delete state.lineupPlans[String(teamId)];
        state.selectedLineupSlot = null;
        saveLineupFormations();
        saveLineupSelections();
        saveLineupPlans();
        state.viewData = buildViewData();
        if (state.currentModal) renderTeamModal(state.currentModal.team, state.currentModal.squad);
        render();
        return;
      }
      const input = event.target.closest("[data-score-side]");
      if (!input) return;
      const panel = input.closest("[data-score-editor]");
      if (panel) saveManualScore(panel.getAttribute("data-score-editor"));
    });

    els.refreshButton.addEventListener("click", refreshData);
    els.projectButton.addEventListener("click", runProjection);
    els.resetSimButton.addEventListener("click", clearSimulation);
    els.modelProjectButton.addEventListener("click", () => {
      state.mode = "model";
      render();
    });
    els.modelResetButton.addEventListener("click", clearSimulation);
    els.zoomInButton.addEventListener("click", () => changeZoom(.1));
    els.zoomOutButton.addEventListener("click", () => changeZoom(-.1));
    els.fitButton.addEventListener("click", fitBracket);
    els.teamModalClose.addEventListener("click", () => { els.teamModal.hidden = true; });
    els.teamModal.addEventListener("click", event => {
      if (event.target === els.teamModal) els.teamModal.hidden = true;
    });
    els.photoLightboxClose.addEventListener("click", closePhotoLightbox);
    els.photoLightbox.addEventListener("click", event => {
      if (event.target === els.photoLightbox) closePhotoLightbox();
    });
    els.groupFilter.addEventListener("change", renderGroups);
    els.matchFilter.addEventListener("change", renderMatches);
    els.matchSearch.addEventListener("input", renderMatches);
    els.bracketSearch.addEventListener("input", renderBracket);
    window.addEventListener("resize", () => window.requestAnimationFrame(drawBracketLines));
    setupBracketDrag();

    const cached = loadCache();
    if (cached) {
      state.data = cached;
      rebuildTeamIndex(cached);
      state.selectedMatchId = findDefaultMatch(cached)?.id || null;
      render();
      setStatus(`cache ${formatCheckedAt(cached.checkedAt)}`, "ok");
    }

    refreshData();
    setInterval(syncActiveScoreEditor, 300);
    setInterval(refreshLiveData, 60 * 1000);
    setInterval(refreshData, 15 * 60 * 1000);
  </script>
</body>
</html>
