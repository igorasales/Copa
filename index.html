    function cleanText(value) {
      return (value || "")
        .replace(/\[[^\]]+\]/g, "")
        .replace(/\s+/g, " ")
        .replace(/\u00a0/g, " ")
        .trim();
    }

    function absoluteUrl(src) {
      if (!src) return "";
      if (src.startsWith("//")) return `https:${src}`;
      if (src.startsWith("/")) return `https://en.wikipedia.org${src}`;
      return src;
    }

    function headingId(node) {
      if (!node || node.nodeType !== 1) return "";
      if (!node.classList.contains("mw-heading")) return "";
      const heading = node.querySelector("h2, h3, h4");
      return heading ? heading.id : "";
    }

    function sectionNodes(doc, startId, stopIds) {
      const heading = doc.getElementById(startId);
      if (!heading) return [];
      const start = heading.closest(".mw-heading") || heading.parentElement;
      const stops = new Set(stopIds);
      const nodes = [];
      for (let node = start.nextSibling; node; node = node.nextSibling) {
        const id = headingId(node);
        if (id && stops.has(id)) break;
        nodes.push(node);
      }
      return nodes;
    }

    function wrapNodes(nodes) {
      const box = document.createElement("div");
      nodes.forEach(node => box.appendChild(node.cloneNode(true)));
      return box;
    }

    function parseMeta(doc) {
      const meta = {
        matchesPlayed: "-",
        goals: "-",
        attendance: "-",
        correctAsOf: ""
      };
      doc.querySelectorAll(".infobox tr").forEach(row => {
        const label = cleanText(row.querySelector("th")?.textContent);
        const value = cleanText(row.querySelector("td")?.textContent);
        if (/Matches played/i.test(label)) meta.matchesPlayed = value;
        if (/Goals scored/i.test(label)) meta.goals = value;
        if (/Attendance/i.test(label)) meta.attendance = value;
      });
      const below = cleanText(doc.querySelector(".infobox-below")?.textContent);
      const match = below.match(/All statistics correct as of ([^.]+)\./i);
      if (match) meta.correctAsOf = match[1];
      return meta;
    }

    function parseTeamCell(cell) {
      const links = Array.from(cell.querySelectorAll("a"));
      const teamLink = links.find(link => /national|team|soccer|football/i.test(link.title || "")) || links[0];
      const raw = cleanText(teamLink ? teamLink.textContent : cell.textContent);
      const localized = localizeName(raw);
      const codes = cleanText(cell.textContent).match(/\(([^)]*)\)/g) || [];
      const statusCode = codes.join(" ");
      const flag = absoluteUrl(cell.querySelector("img")?.getAttribute("src") || "");
      let status = "Pendente";
      let statusClass = "";
      if (/\bA\b/.test(statusCode)) {
        status = "Classificado";
        statusClass = "advance";
      } else if (/\bE\b/.test(statusCode)) {
        status = "Eliminado";
        statusClass = "out";
      }
      return { name: localized, sourceName: raw, flag, status, statusClass };
    }

    function parseGroup(doc, letter, nextId) {
      const id = `Group_${letter}`;
      const stopIds = nextId ? [nextId] : ["Ranking_of_third-placed_teams"];
      const box = wrapNodes(sectionNodes(doc, id, stopIds));
      const table = box.querySelector("table.wikitable");
      const standings = [];
      if (table) {
        Array.from(table.querySelectorAll("tr")).forEach(row => {
          const cells = Array.from(row.querySelectorAll("th, td"));
          const pos = Number(cleanText(cells[0]?.textContent));
          if (!pos || cells.length < 10) return;
          const team = parseTeamCell(cells[1]);
          if (!team.statusClass && pos === 3) {
            team.status = "Possível 3º";
            team.statusClass = "possible";
          }
          standings.push({
            pos,
            team: team.name,
            sourceTeam: team.sourceName,
            flag: team.flag,
            played: cleanText(cells[2]?.textContent),
            wins: cleanText(cells[3]?.textContent),
            draws: cleanText(cells[4]?.textContent),
            losses: cleanText(cells[5]?.textContent),
            gf: cleanText(cells[6]?.textContent),
            ga: cleanText(cells[7]?.textContent),
            gd: cleanText(cells[8]?.textContent).replace("−", "-"),
            pts: cleanText(cells[9]?.textContent),
            status: team.status,
            statusClass: team.statusClass
          });
        });
      }
      const matches = Array.from(box.querySelectorAll(".footballbox")).map((node, index) => parseMatch(node, `Grupo ${letter}`, `G${letter}-${index + 1}`));
      return { letter, label: `Grupo ${letter}`, standings, matches };
    }

    function parseMatch(node, stage, fallbackId) {
      const homeCell = node.querySelector(".fhome");
      const awayCell = node.querySelector(".faway");
      const scoreCell = node.querySelector(".fscore");
      const home = parseMatchTeam(homeCell);
      const away = parseMatchTeam(awayCell);
      const scoreRaw = cleanText(scoreCell?.textContent);
      const score = scoreRaw.replace(/\s*[\u2013\u2014]\s*/g, "-");
      const matchLabel = (scoreRaw.match(/Match\s+\d+/i) || [fallbackId])[0];
      const matchNumber = Number((matchLabel.match(/\d+/) || [])[0]) || null;
      const iso = cleanText(node.querySelector(".dtstart")?.textContent);
      const dateRaw = cleanText(node.querySelector(".fdate")?.childNodes[0]?.textContent || node.querySelector(".fdate")?.textContent);
      const timeRaw = cleanText(node.querySelector(".ftime")?.textContent);
      const parsedTime = parseWikiTime(iso, timeRaw);
      const venue = cleanText(node.querySelector("[itemprop='name address']")?.textContent || node.querySelector(".fright div")?.textContent);
      const reportHref = absoluteUrl(scoreCell?.querySelector("a")?.getAttribute("href") || "");
      const numericScore = score.match(/^(\d+)\s*-\s*(\d+)/);
      const isDone = Boolean(numericScore);
      const status = isDone ? "Finalizado" : "Agendado";
      const statusClass = isDone ? "done" : "pending";
      return {
        id: `${stage}-${matchLabel}`.replace(/\s+/g, "-"),
        stage,
        label: matchLabel,
        matchNumber,
        home,
        away,
        score: score || matchLabel,
        scoreRaw,
        isDone,
        status,
        statusClass,
        isoDate: parsedTime?.isoDate || iso,
        timestamp: parsedTime?.timestamp || null,
        dateDisplay: parsedTime?.display || [dateRaw, timeRaw].filter(Boolean).join(" "),
        dateRaw,
        timeRaw,
        venue,
        reportHref,
        dependsOn: uniqueDependencies([
          ...participantDependencies(home),
          ...participantDependencies(away)
        ])
      };
    }

    function parseMatchTeam(cell) {
      if (!cell) return { name: "A definir", flag: "" };
      const links = Array.from(cell.querySelectorAll("a"));
      const teamLink = links.find(link => /national|team|soccer|football|winner|runner/i.test(link.title || "")) || links[0];
      const sourceName = cleanText(teamLink ? teamLink.textContent : cell.textContent) || "A definir";
      const name = localizeName(sourceName);
      const flag = absoluteUrl(cell.querySelector("img")?.getAttribute("src") || "");
      return { name, sourceName, flag };
    }

    function participantDependencies(team) {
      const text = [team?.sourceName, team?.name].filter(Boolean).join(" ");
      const deps = [];
      const re = /(Winner|Loser|Vencedor|Perdedor)\s+(?:Match|Jogo)\s+(\d+)/gi;
      let match;
      while ((match = re.exec(text))) {
        deps.push({
          type: /loser|perdedor/i.test(match[1]) ? "loser" : "winner",
          matchNumber: Number(match[2])
        });
      }
      return deps;
    }

    function uniqueDependencies(deps) {
      const seen = new Set();
      return deps.filter(dep => {
        if (!dep?.matchNumber) return false;
        const key = `${dep.type}:${dep.matchNumber}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function uniqueValues(values) {
      const seen = new Set();
      return values.filter(value => {
        const key = normalize(value);
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function localizeName(value) {
      const name = cleanText(value);
      if (!name) return "A definir";
      if (TEAM_NAMES_PT[name]) return TEAM_NAMES_PT[name];
      return name
        .replace(/^Winner Group ([A-L])$/i, "1º Grupo $1")
        .replace(/^Runner-up Group ([A-L])$/i, "2º Grupo $1")
        .replace(/^3rd Group ([A-L/]+)$/i, "3º Grupo $1")
        .replace(/^Winner Match (\d+)$/i, "Vencedor Jogo $1")
        .replace(/^Loser Match (\d+)$/i, "Perdedor Jogo $1")
        .replace(/^Winner (.+)$/i, "Vencedor $1")
        .replace(/^Runner-up (.+)$/i, "2º $1");
    }

    function parseWikiTime(isoDate, timeText) {
      if (!isoDate || !timeText) return null;
      const timeMatch = timeText.match(/(\d{1,2})(?::(\d{2}))?\s*(a\.m\.|p\.m\.)/i);
      const utcMatch = timeText.match(/UTC\s*([+\u2212-])\s*(\d{1,2})/i);
      if (!timeMatch || !utcMatch) return null;
      const [year, month, day] = isoDate.split("-").map(Number);
      let hour = Number(timeMatch[1]);
      const minute = Number(timeMatch[2] || 0);
      const period = timeMatch[3].toLowerCase();
      if (period.includes("p") && hour !== 12) hour += 12;
      if (period.includes("a") && hour === 12) hour = 0;
      const sign = utcMatch[1] === "+" ? 1 : -1;
      const offset = sign * Number(utcMatch[2]);
      const timestamp = Date.UTC(year, month - 1, day, hour - offset, minute);
      const formatter = new Intl.DateTimeFormat("pt-BR", {
        timeZone: BR_TZ,
        weekday: "short",
        day: "2-digit",
        month: "short",
        hour: "2-digit",
        minute: "2-digit"
      });
      return {
        timestamp,
        isoDate,
        display: formatter.format(new Date(timestamp)).replace(".", "")
      };
    }

    function parseWikipedia(html) {
      const doc = new DOMParser().parseFromString(html, "text/html");
      const meta = parseMeta(doc);
      const groups = GROUP_LETTERS.map((letter, index) => parseGroup(doc, letter, GROUP_IDS[index + 1]));
      const knockout = ROUND_DEFS.map((round, index) => {
        const stop = ROUND_DEFS[index + 1]?.id || "Statistics";
        const box = wrapNodes(sectionNodes(doc, round.id, [stop]));
        const matches = Array.from(box.querySelectorAll(".footballbox")).map((node, matchIndex) => parseMatch(node, round.label, `${round.label}-${matchIndex + 1}`));
        return { ...round, matches };
      });
      const groupMatches = groups.flatMap(group => group.matches.map(match => ({ ...match, group: group.letter })));
      const knockoutMatches = knockout.flatMap(round => round.matches);
      const allMatches = [...groupMatches, ...knockoutMatches].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
      return {
        meta,
        groups,
        knockout,
        allMatches,
        checkedAt: new Date().toISOString()
      };
    }

    async function fetchFifaMatches() {
      const response = await fetch(`${FIFA_MATCHES_URL}&_=${Date.now()}`, {
        cache: "no-store",
        headers: { accept: "application/json" }
      });
      if (!response.ok) throw new Error(`FIFA HTTP ${response.status}`);
      const json = await response.json();
      return Array.isArray(json?.Results) ? json.Results : [];
    }

    async function loadFifaPlayerStats() {
      if (state.playerStatsCache.size) return state.playerStatsCache;
      if (state.playerStatsPromise) return state.playerStatsPromise;
      state.playerStatsPromise = (async () => {
        const players = await fetchFifaPlayerStats();
        cacheFifaPlayerStats(players);
        return state.playerStatsCache;
      })().catch(() => state.playerStatsCache);
      return state.playerStatsPromise;
    }

    async function fetchFifaPlayerStats() {
      const functionStats = await fetchFifaPlayerStatsFromFunction();
      if (functionStats.length) return functionStats;
      const tokenResponse = await fetchWithTimeout(FIFA_GAMEDAY_TOKEN_URL, {
        headers: { accept: "application/json" }
      }, 5000);
      if (!tokenResponse.ok) throw new Error(`FIFA token HTTP ${tokenResponse.status}`);
      const token = (await tokenResponse.json())?.token;
      if (!token) throw new Error("FIFA token vazio");
      const responses = await Promise.allSettled(FIFA_PLAYER_STAT_CLASSES.map(name => fetchFifaStatClass(name, token)));
      return responses.flatMap(result => result.status === "fulfilled" ? result.value : []);
    }

    async function fetchFifaPlayerStatsFromFunction() {
      try {
        const response = await fetchWithTimeout(FIFA_STATS_FUNCTION_URL, {}, 6500);
        if (!response.ok) return [];
        const json = await response.json();
        return Array.isArray(json?.players) ? json.players : [];
      } catch {
        return [];
      }
    }

    async function fetchFifaStatClass(name, token) {
      const query = `(and resourceStatus==\`urn:gd:resourceStatus:active\` _externalId~\`urn:gd:story:classification:${name}:competitionId:285023:(.*):rank_asc:page:1$\`)`;
      const params = new URLSearchParams({
        query,
        skip: "0",
        limit: "1",
        sort: "tags.name==urn:gd:tag:story:fifa:column_number:asc"
      });
      const response = await fetchWithTimeout(`${FIFA_GAMEDAY_STORIES_URL}?${params}`, {
        headers: {
          accept: "application/json",
          authorization: `Bearer ${token}`
        }
      }, 7000);
      if (!response.ok) throw new Error(`FIFA stats HTTP ${response.status}`);
      const json = await response.json();
      return (json?.items || []).flatMap(item => item?.actors || []).map(parseFifaStatActor).filter(Boolean);
    }

    function parseFifaStatActor(actor) {
      const tags = Array.isArray(actor?.tags) ? actor.tags : [];
      const tag = suffix => tags.find(item => item.name?.endsWith(suffix))?.value;
      const stats = {
        id: actor?.key?._externalSportsPersonId || "",
        name: actor?.name?.por || actor?.name?.eng || tag(":staff:display_name:por") || tag(":staff:display_name:eng") || "",
        teamCode: tag(":team:abbreviation") || "",
        teamName: tag(":team:name:por") || tag(":team:name:eng") || "",
        image: tag(":staff:image") || ""
      };
      tags.forEach(item => {
        const match = item.name?.match(/football:stats:([^:]+)$/);
        if (match) stats[match[1]] = item.value;
      });
      return stats.id || stats.name ? stats : null;
    }

    function cacheFifaPlayerStats(players) {
      (players || []).forEach(stats => {
        const existing = findCachedFifaStats(stats.id, stats.name) || {};
        const merged = mergeFifaStatObjects(existing, stats);
        [stats.id, stats.name, normalize(stats.name)].filter(Boolean).forEach(key => {
          state.playerStatsCache.set(String(key), merged);
        });
      });
    }

    function mergeFifaStatObjects(base, next) {
      const merged = { ...(base || {}) };
      Object.entries(next || {}).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== "") merged[key] = value;
      });
      return merged;
    }

    function findCachedFifaStats(id, name) {
      return state.playerStatsCache.get(String(id || "")) || state.playerStatsCache.get(normalize(name || ""));
    }

    function mergeFifaStatsIntoPlayers(players) {
      (players || []).forEach(player => {
        const stats = fifaStatsForPlayer(player);
        if (!stats) return;
        player.FifaStats = mergeFifaStatObjects(player.FifaStats || {}, stats);
        if (stats.image && !player.PictureUrl && !player.PlayerPicture?.PictureUrl) {
          player.PictureUrl = `${stats.image}?&io=transform:crop,height:850,width:850&quality=75`;
        }
        if (stats.goals !== undefined) player.Goals = stats.goals;
        if (stats.assists !== undefined) player.Assists = stats.assists;
        if (stats.attempt_at_goal !== undefined) player.AttemptsAtGoal = stats.attempt_at_goal;
        if (stats.passes !== undefined) player.Passes = stats.passes;
        if (stats.time_played !== undefined) player.MinutesPlayed = stats.time_played;
        if (stats.total_distance !== undefined) player.TotalDistance = stats.total_distance;
      });
    }

    function fifaStatsForPlayer(player) {
      return player?.FifaStats
        || state.playerStatsCache.get(String(player?.IdPlayer || ""))
        || state.playerStatsCache.get(normalize(playerFullName(player)))
        || state.playerStatsCache.get(normalize(playerShortName(player)))
        || null;
    }

    async function fetchSquadFacts() {
      const response = await fetch(`${SQUADS_API_URL}&_=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`Squads HTTP ${response.status}`);
      const json = await response.json();
      const html = json?.parse?.text?.["*"];
      if (!html) throw new Error("Resposta sem elencos");
      return parseSquadFacts(html);
    }

    function parseSquadFacts(html) {
      const doc = new DOMParser().parseFromString(html, "text/html");
      const facts = {};
      doc.querySelectorAll("table.wikitable").forEach(table => {
        const heading = previousSquadHeading(table);
        const team = localizeName(cleanText(heading?.textContent || ""));
        if (!team || /Group|Statistics|Notes|References/i.test(team)) return;
        table.querySelectorAll("tbody tr").forEach(row => {
          const cells = Array.from(row.children).filter(cell => /TD|TH/.test(cell.tagName));
          if (cells.length < 7 || !/^\d+$/.test(cleanText(cells[0].textContent))) return;
          const playerLink = cells[2].querySelector("a[title]") || cells[2].querySelector("a");
          const player = cleanText(playerLink?.textContent || cells[2].textContent).replace(/\s*\(captain\)\s*/i, "");
          if (!player) return;
          const clubLinks = Array.from(cells[6].querySelectorAll("a")).filter(link => cleanText(link.textContent));
          const club = cleanText(clubLinks.at(-1)?.textContent || cells[6].textContent);
          const clubCountry = cleanText(cells[6].querySelector("img")?.getAttribute("alt") || cells[6].querySelector("img")?.getAttribute("title") || "");
          const fact = {
            team,
            player,
            caps: Number(cleanText(cells[4].textContent)) || 0,
            nationalGoals: Number(cleanText(cells[5].textContent)) || 0,
            club,
            clubCountry,
            position: cleanText(cells[1].textContent).replace(/^\d+/, "")
          };
          playerNameKeys(player).forEach(key => { facts[key] = fact; });
        });
      });
      return facts;
    }

    function previousSquadHeading(table) {
      for (let node = table.previousElementSibling; node; node = node.previousElementSibling) {
        const heading = node.matches?.(".mw-heading") ? node.querySelector("h3") : (node.matches?.("h3") ? node : null);
        if (heading) return heading;
        if (node.matches?.("h2") || node.querySelector?.("h2")) return null;
      }
      return null;
    }

    function playerNameKeys(name) {
      const normalized = normalize(name);
      const parts = normalized.split(/\s+/).filter(Boolean);
      const keys = new Set([normalized]);
      if (parts.length > 1) {
        keys.add(`${parts[0]} ${parts.at(-1)}`);
        keys.add(parts.at(-1));
      }
      return [...keys].filter(Boolean);
    }

    function playerFact(player) {
      const facts = state.data?.playerFacts || {};
      const candidates = [
        playerFullName(player),
        playerShortName(player),
        localizedDescription(player?.PlayerName),
        localizedDescription(player?.ShortName)
      ].flatMap(playerNameKeys);
      const teamName = normalize(player?.teamName || "");
      for (const key of candidates) {
        const fact = facts[key];
        if (!fact) continue;
        if (!teamName || normalize(fact.team) === teamName) return fact;
      }
      return null;
    }

    function clubTier(club) {
      const key = normalize(club);
      if (/real madrid|barcelona|manchester city|bayern|paris saint|liverpool|arsenal|chelsea|milan|inter|juventus|psg/.test(key)) return 7;
      if (/tottenham|atletico|dortmund|leverkusen|benfica|porto|ajax|napoli|roma|newcastle|aston villa|west ham/.test(key)) return 5;
      if (/mls|inter miami|flamengo|palmeiras|river plate|boca juniors|al hilal|al nassr/.test(key)) return 3;
      return club ? 1 : 0;
    }

    function playerMoral(player) {
      const fact = playerFact(player);
      const age = playerAge(player);
      const goals = Number(player?.Goals) || 0;
      const cards = (Number(player?.YellowCards) || 0) + ((Number(player?.RedCards) || 0) * 3);
      const caps = Number(fact?.caps) || 0;
      const nationalGoals = Number(fact?.nationalGoals) || 0;
      const youth = age && age <= 23 ? 4 : 0;
      const peak = age && age >= 24 && age <= 31 ? 3 : 0;
      const legacy = Math.min(10, (caps / 18) + (nationalGoals / 8));
      const moment = Math.min(10, goals * 4);
      return Math.round(Math.max(35, Math.min(96, 58 + youth + peak + legacy + moment + clubTier(fact?.club) - cards)));
    }

    function applyFifaMatches(data, fifaMatches) {
      if (!data || !Array.isArray(fifaMatches) || !fifaMatches.length) return data;
      const byNumber = new Map();
      fifaMatches.forEach(item => {
        const number = Number(item.MatchNumber);
        if (number) byNumber.set(number, item);
      });
      const update = match => {
        const item = match.matchNumber ? byNumber.get(match.matchNumber) : null;
        if (!item) return match;
        const homeScore = numberOrNull(item.HomeTeamScore ?? item.Home?.Score);
        const awayScore = numberOrNull(item.AwayTeamScore ?? item.Away?.Score);
        const hasScore = homeScore !== null && awayScore !== null;
        const statusInfo = fifaStatus(item);
        const dateInfo = parseFifaDate(item.Date);
        const homeName = item.Home?.ShortClubName || localizedDescription(item.Home?.TeamName);
        const awayName = item.Away?.ShortClubName || localizedDescription(item.Away?.TeamName);
        const venue = [localizedDescription(item.Stadium?.Name), localizedDescription(item.Stadium?.CityName)].filter(Boolean).join(", ");
        return {
          ...match,
          home: {
            ...match.home,
            name: homeName ? localizeName(homeName) : match.home.name,
            sourceName: homeName || match.home.sourceName,
            idTeam: item.Home?.IdTeam || match.home.idTeam,
            idCountry: item.Home?.IdCountry || match.home.idCountry,
            flag: fifaFlag(item.Home?.PictureUrl) || match.home.flag
          },
          away: {
            ...match.away,
            name: awayName ? localizeName(awayName) : match.away.name,
            sourceName: awayName || match.away.sourceName,
            idTeam: item.Away?.IdTeam || match.away.idTeam,
            idCountry: item.Away?.IdCountry || match.away.idCountry,
            flag: fifaFlag(item.Away?.PictureUrl) || match.away.flag
          },
          score: hasScore ? `${homeScore}-${awayScore}` : match.score,
          scoreRaw: hasScore ? `${homeScore}-${awayScore}` : match.scoreRaw,
          isDone: statusInfo.isDone,
          isLive: statusInfo.isLive,
          status: statusInfo.label,
          statusClass: statusInfo.className,
          badge: statusInfo.badge || (hasScore ? `${homeScore}-${awayScore}` : match.label),
          fifaStatusCode: item.MatchStatus,
          fifaResultType: item.ResultType,
          fifaMatchTime: item.MatchTime || "",
          timestamp: dateInfo?.timestamp || match.timestamp,
          isoDate: dateInfo?.isoDate || match.isoDate,
          dateDisplay: dateInfo?.display || match.dateDisplay,
          venue: venue || match.venue,
          stadiumCountry: item.Stadium?.IdCountry || match.stadiumCountry || "",
          liveUpdatedAt: new Date().toISOString(),
          dataSource: "FIFA"
        };
      };
      const groups = data.groups.map(group => ({
        ...group,
        matches: group.matches.map(update)
      }));
      const knockout = data.knockout.map(round => ({
        ...round,
        matches: round.matches.map(update)
      }));
      const allMatches = [
        ...groups.flatMap(group => group.matches.map(match => ({ ...match, group: group.letter }))),
        ...knockout.flatMap(round => round.matches)
      ].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
      return {
        ...data,
        groups,
        knockout,
        allMatches,
        fifaCheckedAt: new Date().toISOString()
      };
    }

    function rebuildTeamIndex(data) {
      state.teamIndex = new Map();
      if (!data) return;
      data.allMatches.forEach(match => {
        [match.home, match.away].forEach(team => {
          if (!team?.name || team.name === "A definir") return;
          const key = normalize(team.name);
          const previous = state.teamIndex.get(key) || {};
          state.teamIndex.set(key, {
            ...previous,
            ...team,
            name: team.name,
            sourceName: team.sourceName || team.name,
            flag: team.flag || previous.flag,
            idTeam: team.idTeam || previous.idTeam,
            idCountry: team.idCountry || previous.idCountry
          });
          if (team.idTeam) state.teamIndex.set(String(team.idTeam), state.teamIndex.get(key));
        });
      });
    }

    function numberOrNull(value) {
      return typeof value === "number" && Number.isFinite(value) ? value : null;
    }

    function localizedDescription(list) {
      return Array.isArray(list) ? (list.find(item => item.Locale === "en-GB") || list[0])?.Description || "" : "";
    }

    function playerFullName(player) {
      return localizedDescription(player?.PlayerName) || localizedDescription(player?.ShortName) || "Jogador";
    }

    function playerShortName(player) {
      return localizedDescription(player?.ShortName) || playerFullName(player);
    }

    function playerPhoto(player) {
      return player?.PlayerPicture?.PictureUrl || player?.PictureUrl || player?.ThumbnailUrl || "";
    }

    function playerPosition(player) {
      return localizedDescription(player?.RealPositionLocalized) || localizedDescription(player?.PositionLocalized) || "-";
    }

    function positionRole(player) {
      const text = playerPosition(player);
      if (/goalkeeper/i.test(text)) return "gk";
      if (/defender|back/i.test(text)) return "def";
      if (/midfielder/i.test(text)) return "mid";
      if (/forward|striker|winger/i.test(text)) return "fwd";
      return "mid";
    }

    function playerAge(player) {
      if (!player?.BirthDate) return null;
      const diff = Date.now() - new Date(player.BirthDate).getTime();
      if (!Number.isFinite(diff)) return null;
      return Math.floor(diff / 31557600000);
    }

    function playerAttributes(player) {
      const role = positionRole(player);
      const age = playerAge(player);
      const height = Number(player?.Height) || 180;
      const weight = Number(player?.Weight) || 76;
      const fifaStats = fifaStatsForPlayer(player) || {};
      const goals = Number(fifaStats.goals ?? player?.Goals) || 0;
      const assists = Number(fifaStats.assists ?? player?.Assists) || 0;
      const passes = Number(fifaStats.passes ?? player?.Passes) || 0;
      const distance = Number(fifaStats.total_distance ?? player?.TotalDistance) || 0;
      const yellows = Number(player?.YellowCards) || 0;
      const reds = Number(player?.RedCards) || 0;
      const matches = Number(player?.MatchesPlayed) || (Number(fifaStats.time_played ?? player?.MinutesPlayed) ? 1 : 0);
      const fact = playerFact(player);
      const caps = Number(fact?.caps) || 0;
      const nationalGoals = Number(fact?.nationalGoals) || 0;
      const moral = playerMoral(player);
      const agePeak = age ? Math.max(0, 14 - Math.abs(age - 28)) : 7;
      const experience = Math.round(Math.max(48, Math.min(92, 55 + agePeak + Math.min(12, matches * 2) + Math.min(10, caps / 15))));
      const physical = Math.round(Math.max(45, Math.min(94, 58 + ((height - 175) * .55) + ((weight - 72) * .18) + (agePeak * .9) + Math.min(3, distance / 22000))));
      const discipline = Math.round(Math.max(38, Math.min(96, 82 - (yellows * 2.5) - (reds * 8))));
      const base = {
        gk: { attack: 34, defense: 82, creation: 54, goalkeeping: 84 },
        def: { attack: 52, defense: 78, creation: 61, goalkeeping: 36 },
        mid: { attack: 67, defense: 66, creation: 76, goalkeeping: 34 },
        fwd: { attack: 80, defense: 48, creation: 68, goalkeeping: 32 }
      }[role];
      const attack = Math.round(Math.max(35, Math.min(96, base.attack + (goals * 2.4) + (assists * 1.4) + (nationalGoals * .18) + (agePeak * .55))));
      const defense = Math.round(Math.max(35, Math.min(96, base.defense + (role === "gk" ? (height - 185) * .28 : (height - 180) * .18) + (discipline - 78) * .12)));
      const creation = Math.round(Math.max(35, Math.min(96, base.creation + (experience - 65) * .22 + (assists * 1.8) + Math.min(3, passes / 180))));
      const goalkeeping = Math.round(Math.max(25, Math.min(96, base.goalkeeping + (role === "gk" ? (height - 185) * .2 : 0))));
      const weights = {
        gk: { goalkeeping: .42, defense: .18, creation: .10, physical: .12, experience: .12, discipline: .06 },
        def: { attack: .12, defense: .36, creation: .16, physical: .16, experience: .14, discipline: .06 },
        mid: { attack: .20, defense: .18, creation: .34, physical: .12, experience: .10, discipline: .06 },
        fwd: { attack: .38, defense: .10, creation: .20, physical: .14, experience: .12, discipline: .06 }
      }[role];
      const overallRaw =
        ((weights.attack || 0) * attack) +
        ((weights.defense || 0) * defense) +
        ((weights.creation || 0) * creation) +
        ((weights.physical || 0) * physical) +
        ((weights.experience || 0) * experience) +
        ((weights.discipline || 0) * discipline) +
        ((weights.goalkeeping || 0) * goalkeeping);
      const overall = Math.round(Math.max(40, Math.min(96, overallRaw)));
      return { role, overall, attack, defense, creation, physical, discipline, experience, goalkeeping, moral };
    }

    function squadModel(players, idTeam = "") {
      return squadModelFromLineup(players, idTeam, lineupForTeam(players, idTeam), true);
    }

    function squadModelFromLineup(players, idTeam = "", starters = [], includeTactics = true) {
      const list = (players || []).map(player => ({ player, attrs: playerAttributes(player) }));
      if (!list.length) return null;
      const starterIds = new Set((starters || []).map(player => String(player.IdPlayer)));
      const starterList = list.filter(item => starterIds.has(String(item.player.IdPlayer)));
      const benchList = list.filter(item => !starterIds.has(String(item.player.IdPlayer)));
      const activeStarters = starterList.length ? starterList : list.slice(0, 11);
      const topAverage = (items, field, count) => {
        const values = items
          .map(item => item.attrs[field])
          .filter(value => Number.isFinite(value))
          .sort((a, b) => b - a)
          .slice(0, count);
        return values.length ? Math.round(values.reduce((sum, value) => sum + value, 0) / values.length) : 50;
      };
      const blend = (field, count) => Math.round((topAverage(activeStarters, field, count) * .80) + (topAverage(benchList.length ? benchList : list, field, Math.min(7, benchList.length || list.length)) * .20));
      const byRole = (items, role) => items.filter(item => item.attrs.role === role);
      const tactical = includeTactics ? tacticalModelAdjustments(players, idTeam) : { attack: 0, defense: 0, edited: 0 };
      const synergy = squadSynergy(activeStarters.map(item => item.player));
      const rawOverall = blend("overall", Math.min(11, activeStarters.length || list.length));
      const rawMoral = blend("moral", Math.min(11, activeStarters.length || list.length));
      return {
        overall: Math.max(40, Math.min(96, Math.round(rawOverall + ((synergy - 55) * .08)))),
        attack: Math.max(40, Math.min(96, topAverage(byRole(activeStarters, "fwd").length ? byRole(activeStarters, "fwd") : activeStarters, "attack", 4) + tactical.attack)),
        midfield: topAverage(byRole(activeStarters, "mid").length ? byRole(activeStarters, "mid") : activeStarters, "creation", 5),
        defense: Math.max(40, Math.min(96, topAverage(byRole(activeStarters, "def").length ? byRole(activeStarters, "def") : activeStarters, "defense", 5) + tactical.defense)),
        goalkeeper: topAverage(byRole(activeStarters, "gk").length ? byRole(activeStarters, "gk") : activeStarters, "goalkeeping", 1),
        moral: Math.max(35, Math.min(96, Math.round(rawMoral + ((synergy - 50) * .12)))),
        synergy,
        tactical
      };
    }

    function squadSynergy(starters) {
      const players = (starters || []).filter(Boolean);
      if (!players.length) return 0;
      const clubs = new Map();
      let capsTotal = 0;
      let experienceTotal = 0;
      const roles = new Set();
      players.forEach(player => {
        const fact = playerFact(player);
        const club = normalize(fact?.club || "");
        if (club) clubs.set(club, (clubs.get(club) || 0) + 1);
        capsTotal += Number(fact?.caps) || 0;
        const attrs = playerAttributes(player);
        experienceTotal += Number(attrs.experience) || 55;
        roles.add(attrs.role);
      });
      const sameClubPairs = [...clubs.values()].reduce((sum, count) => sum + Math.max(0, count - 1), 0);
      const clubBonus = Math.min(16, sameClubPairs * 3.4);
      const avgCaps = capsTotal / Math.max(1, players.length);
      const capsBonus = Math.min(18, avgCaps * .34);
      const experienceBonus = Math.max(-6, Math.min(14, ((experienceTotal / players.length) - 62) * .42));
      const balanceBonus = Math.min(8, roles.size * 2);
      const knownDataBonus = clubs.size ? 4 : 0;
      return Math.round(Math.max(35, Math.min(92, 42 + clubBonus + capsBonus + experienceBonus + balanceBonus + knownDataBonus)));
    }

    function lineupImpact(players, teamId = "") {
      const formation = formationForTeam(teamId);
      const current = squadModel(players, teamId);
      const baseline = squadModelFromLineup(players, teamId, defaultLineup(players || [], formation), false);
      if (!current || !baseline) return null;
      return {
        overall: current.overall - baseline.overall,
        attack: current.attack - baseline.attack,
        defense: current.defense - baseline.defense,
        moral: current.moral - baseline.moral,
        synergy: current.synergy - baseline.synergy
      };
    }

    function tacticalModelAdjustments(players, idTeam) {
      const plan = state.lineupPlans[String(idTeam)] || {};
      let attack = 0;
      let defense = 0;
      let used = 0;
      (players || []).forEach(player => {
        const pos = plan[String(player.IdPlayer)];
        if (!pos) return;
        used += 1;
        attack += (50 - Number(pos.y || 50)) / 18;
        defense += (Number(pos.y || 50) - 50) / 20;
      });
      return {
        attack: Math.round(Math.max(-6, Math.min(6, attack / Math.max(1, used)))),
        defense: Math.round(Math.max(-6, Math.min(6, defense / Math.max(1, used)))),
        edited: used
      };
    }

    function squadStrengthForTeam(idTeam) {
      if (!idTeam) return null;
      const squad = state.squadCache.get(String(idTeam)) || state.squadCache.get(idTeam);
      const players = Array.isArray(squad?.Players) ? squad.Players : [];
      return squadModel(players, idTeam);
    }

    function fifaFlag(template) {
      if (!template) return "";
      return template.replace("{format}", "sq").replace("{size}", "2");
    }

    function fifaStatus(item) {
      const code = Number(item.MatchStatus);
      const resultType = Number(item.ResultType);
      const time = cleanText(item.MatchTime);
      if (code === 0 || resultType === 1) {
        return { label: "Finalizado", className: "done", isDone: true, isLive: false, badge: "Final" };
      }
      if (code === 1) {
        return { label: "Agendado", className: "pending", isDone: false, isLive: false, badge: `Match ${item.MatchNumber}` };
      }
      return {
        label: time ? `Ao vivo ${time}` : "Ao vivo",
        className: "live",
        isDone: false,
        isLive: true,
        badge: time ? `Ao vivo ${time}` : "Ao vivo"
      };
    }

    function parseFifaDate(iso) {
      if (!iso) return null;
      const timestamp = Date.parse(iso);
      if (!Number.isFinite(timestamp)) return null;
      const formatter = new Intl.DateTimeFormat("pt-BR", {
        timeZone: BR_TZ,
        weekday: "short",
        day: "2-digit",
        month: "short",
        hour: "2-digit",
        minute: "2-digit"
      });
      return {
        timestamp,
        isoDate: iso.slice(0, 10),
        display: formatter.format(new Date(timestamp)).replace(".", "")
      };
    }

    async function refreshData() {
      if (state.loading) return;
      setLoading(true);
      setStatus("checando dados", "pending");
      try {
        const response = await fetch(`${API_URL}&_=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const json = await response.json();
        const html = json?.parse?.text?.["*"];
        if (!html) throw new Error("Resposta sem HTML");
        let data = parseWikipedia(html);
        try {
          data = applyFifaMatches(data, await fetchFifaMatches());
        } catch (error) {
          data.fifaError = error.message;
        }
        try {
          data.playerFacts = await fetchSquadFacts();
          data.squadFactsCheckedAt = new Date().toISOString();
        } catch (error) {
          data.squadFactsError = error.message;
        }
        state.data = data;
        rebuildTeamIndex(data);
        state.selectedMatchId = findDefaultMatch(data)?.id || null;
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        render();
        const source = data.fifaCheckedAt ? "FIFA" : "Wikipedia";
        setStatus(`${source} ${formatCheckedAt(data.fifaCheckedAt || data.checkedAt)}`, "ok");
      } catch (error) {
        const cached = loadCache();
        if (cached) {
          state.data = cached;
          rebuildTeamIndex(cached);
          if (!state.selectedMatchId) state.selectedMatchId = findDefaultMatch(cached)?.id || null;
          render();
          setStatus(`usando cache ${formatCheckedAt(cached.checkedAt)}`, "bad");
        } else {
          renderEmpty(error);
          setStatus("sem conexão com a fonte", "bad");
        }
      } finally {
        setLoading(false);
      }
    }

    async function refreshLiveData() {
      if (!state.data || state.loading) return;
      try {
        const updated = applyFifaMatches(state.data, await fetchFifaMatches());
        state.data = updated;
        rebuildTeamIndex(updated);
        localStorage.setItem(CACHE_KEY, JSON.stringify(updated));
        render();
        setStatus(`FIFA ${formatCheckedAt(updated.fifaCheckedAt)}`, "ok");
      } catch (error) {
        setStatus(`sem live FIFA: ${formatCheckedAt(state.data.fifaCheckedAt || state.data.checkedAt)}`, "bad");
      }
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function setLoading(value) {
      state.loading = value;
      els.refreshButton.disabled = value;
      els.refreshButton.textContent = value ? "Atualizando" : "Atualizar agora";
    }

    function setStatus(text, tone) {
      const cls = tone === "ok" ? "ok" : tone === "bad" ? "bad" : "";
      els.syncStatus.innerHTML = `<span class="status-dot ${cls}"></span>${escapeHtml(text)}`;
    }

    function formatCheckedAt(iso) {
      if (!iso) return "";
      return new Intl.DateTimeFormat("pt-BR", {
        timeZone: BR_TZ,
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(iso));
    }

    function findDefaultMatch(data) {
      const now = Date.now();
      return data.allMatches.find(match => match.isLive)
        || data.knockout.flatMap(round => round.matches).find(match => !match.isDone && match.timestamp && match.timestamp >= now)
        || data.knockout.flatMap(round => round.matches).find(Boolean)
        || data.allMatches.find(match => !match.isDone)
        || data.allMatches.at(-1);
    }

    function buildViewData() {
      const data = deepClone(state.data);
      data.ratings = calculateRatings(data);
      if (state.mode === "live") return data;
      applyScoreOverrides(data, data.ratings, state.mode === "model");
      data.ratings = calculateRatings(data);
      return data;
    }

    function deepClone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function calculateRatings(data) {
      const ratings = new Map();
      const ensure = team => {
        const key = normalize(team?.name || "");
        if (!key) return null;
        if (!ratings.has(key)) {
          ratings.set(key, {
            key,
            name: team.name,
            sourceName: team.sourceName || team.name,
            flag: team.flag || "",
            idTeam: team.idTeam || "",
            attack: 1.15,
            defense: 1.15,
            form: 50,
            score: 50,
            played: 0,
            gf: 0,
            ga: 0,
            wins: 0
          });
        }
        const entry = ratings.get(key);
        entry.flag = entry.flag || team.flag || "";
        entry.idTeam = entry.idTeam || team.idTeam || "";
        entry.sourceName = entry.sourceName || team.sourceName || team.name;
        return entry;
      };
      data.groups.forEach(group => {
        group.standings.forEach(row => {
          const entry = ensure({ name: row.team, flag: row.flag, sourceName: row.sourceTeam });
          if (!entry) return;
          const played = Number(row.played) || 0;
          const gf = Number(row.gf) || 0;
          const ga = Number(row.ga) || 0;
          const gd = Number(row.gd) || 0;
          const pts = Number(row.pts) || 0;
          entry.played = Math.max(entry.played, played);
          entry.gf = Math.max(entry.gf, gf);
          entry.ga = Math.max(entry.ga, ga);
          entry.attack = played ? Math.max(.45, gf / played) : entry.attack;
          entry.defense = played ? Math.max(.45, ga / played) : entry.defense;
          entry.form = 46 + (pts * 3.2) + (gd * 2.2) + (gf * .9) - (ga * .5);
        });
      });
      data.allMatches.forEach(match => {
        if (!hasNumericScore(match)) return;
        const home = ensure(match.home);
        const away = ensure(match.away);
        if (!home || !away) return;
        const [h, a] = scoreParts(match);
        home.played += .25;
        away.played += .25;
        home.gf += h * .25;
        home.ga += a * .25;
        away.gf += a * .25;
        away.ga += h * .25;
        if (h > a) home.wins += 1;
        if (a > h) away.wins += 1;
      });
      ratings.forEach(entry => {
        const played = Math.max(1, entry.played);
        const attack = entry.gf / played;
        const defense = entry.ga / played;
        entry.attack = Number(Math.max(.35, attack || entry.attack).toFixed(2));
        entry.defense = Number(Math.max(.35, defense || entry.defense).toFixed(2));
        const performanceScore = Math.round(Math.max(24, Math.min(96, entry.form + (entry.attack * 6) - (entry.defense * 3) + (entry.wins * 1.3))));
        entry.history = TEAM_HISTORY_WEIGHT[normalize(entry.name)] || 56;
        entry.externalPower = EXTERNAL_TEAM_POWER[normalize(entry.name)] || Math.max(48, Math.min(78, entry.history));
        entry.formScore = performanceScore;
        const squad = squadStrengthForTeam(entry.idTeam);
        if (squad) {
          entry.squadScore = squad.overall;
          entry.squadAttack = squad.attack;
          entry.squadDefense = squad.defense;
          entry.squadMoral = squad.moral;
          entry.squadSynergy = squad.synergy || 0;
          entry.tacticalAttack = squad.tactical?.attack || 0;
          entry.tacticalDefense = squad.tactical?.defense || 0;
        } else {
          entry.squadSynergy = estimatedTeamSynergy(entry);
        }
        const formMoral = Math.max(35, Math.min(92, performanceScore));
        const shirtWeight = Math.max(38, Math.min(96, ((entry.history || 56) * .72) + ((entry.externalPower || 56) * .28)));
        entry.moral = Math.round(Math.max(35, Math.min(96,
          ((entry.squadMoral || 58) * .36) +
          (formMoral * .28) +
          (shirtWeight * .18) +
          ((entry.externalPower || 56) * .18)
        )));
        entry.score = Math.round(Math.max(24, Math.min(96,
          (entry.externalPower * MODEL_WEIGHTS.externalPower) +
          ((entry.squadScore || entry.externalPower) * MODEL_WEIGHTS.squad) +
          (performanceScore * MODEL_WEIGHTS.form) +
          (entry.moral * MODEL_WEIGHTS.moral) +
          (((entry.squadSynergy || 50) - 50) * .08)
        )));
        entry.confidence = Math.round(Math.max(38, Math.min(94,
          42 +
          (EXTERNAL_TEAM_POWER[normalize(entry.name)] ? 16 : 6) +
          (entry.squadScore ? 22 : 0) +
          Math.min(14, entry.played * 5)
        )));
        entry.components = {
          base: Math.round(entry.externalPower),
          squad: Math.round(entry.squadScore || entry.externalPower),
          form: Math.round(performanceScore),
          moral: Math.round(entry.moral),
          synergy: Math.round(teamSynergyValue(entry)),
          history: Math.round(entry.history)
        };
      });
      return Object.fromEntries([...ratings.entries()].sort((a, b) => b[1].score - a[1].score));
    }

    function estimatedTeamSynergy(entry) {
      const base = 48;
      const history = Math.max(0, Math.min(14, ((entry.history || 56) - 50) * .35));
      const power = Math.max(0, Math.min(10, ((entry.externalPower || 56) - 52) * .22));
      const form = Math.max(-5, Math.min(8, ((entry.formScore || 50) - 50) * .12));
      const matches = Math.min(6, (entry.played || 0) * 1.2);
      return Math.round(Math.max(38, Math.min(82, base + history + power + form + matches)));
    }

    function applyScoreOverrides(data, ratings, allowModel) {
      const matchResults = new Map();
      const setResult = match => {
        const manual = state.simScores[match.matchNumber];
        if (manual) {
          applyProjectedScore(match, manual.home, manual.away, "Manual", "sim");
        } else if (allowModel && !match.isDone && !match.isLive && !hasNumericScore(match) && isPlayableMatch(match)) {
          const prediction = predictScore(match.home, match.away, ratings, match);
          applyProjectedScore(match, prediction.home, prediction.away, "Modelo", "model", prediction);
          match.probability = prediction;
        }
      };
      data.groups.forEach(group => group.matches.forEach(setResult));
      recomputeGroups(data);
      const standingsByGroup = Object.fromEntries(data.groups.map(group => [group.letter, group.standings]));
      getMainBracketRoundsFrom(data).forEach(round => {
        round.matches.forEach(match => {
          match.home = resolveParticipant(match.home, standingsByGroup, matchResults) || match.home;
          match.away = resolveParticipant(match.away, standingsByGroup, matchResults) || match.away;
          setResult(match);
          if (hasNumericScore(match)) {
            const [h, a] = scoreParts(match);
            const winner = h === a
              ? (match.penaltyWinner === "away" ? match.away : (match.penaltyWinner === "home" ? match.home : strongerTeam(match.home, match.away, ratings)))
              : (h > a ? match.home : match.away);
            const loser = winner === match.home ? match.away : match.home;
            if (match.matchNumber) matchResults.set(match.matchNumber, { winner, loser });
          }
        });
      });
      const third = data.knockout.find(round => round.id === "Match_for_third_place")?.matches?.[0];
      if (third) {
        third.home = resolveParticipant(third.home, standingsByGroup, matchResults) || third.home;
        third.away = resolveParticipant(third.away, standingsByGroup, matchResults) || third.away;
        setResult(third);
      }
      data.allMatches = [
        ...data.groups.flatMap(group => group.matches.map(match => ({ ...match, group: group.letter }))),
        ...data.knockout.flatMap(round => round.matches)
      ].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    }

    function getMainBracketRoundsFrom(data) {
      const order = ["Round_of_32", "Round_of_16", "Quarterfinals", "Semifinals", "Final"];
      return orderBracketRounds(order.map(id => data.knockout.find(round => round.id === id)).filter(Boolean));
    }

    function applyProjectedScore(match, home, away, label, className, extra = {}) {
      match.score = `${home}-${away}`;
      match.scoreRaw = match.score;
      match.isDone = true;
      match.isLive = false;
      match.status = label;
      match.statusClass = className === "model" ? "pending" : "live";
      match.penaltyScore = extra.penaltyScore || "";
      match.penaltyWinner = extra.penaltyWinner || "";
      match.badge = extra.penaltyScore ? `${label}: ${match.score} pen. ${extra.penaltyScore}` : `${label}: ${match.score}`;
      match.projected = className;
    }

    function isPlayableMatch(match) {
      return match.home?.name && match.away?.name && !/A definir|Grupo|Jogo/.test(`${match.home.name} ${match.away.name}`);
    }

    function recomputeGroups(data) {
      data.groups.forEach(group => {
        const rows = new Map();
        group.standings.forEach(row => {
          rows.set(normalize(row.team), {
            ...row,
            played: 0,
            wins: 0,
            draws: 0,
            losses: 0,
            gf: 0,
            ga: 0,
            gd: 0,
            pts: 0,
            status: "Pendente",
            statusClass: ""
          });
        });
        group.matches.forEach(match => {
          if (!hasNumericScore(match)) return;
          const home = rows.get(normalize(match.home.name));
          const away = rows.get(normalize(match.away.name));
          if (!home || !away) return;
          const [h, a] = scoreParts(match);
          home.played += 1;
          away.played += 1;
          home.gf += h;
          home.ga += a;
          away.gf += a;
          away.ga += h;
          if (h > a) {
            home.wins += 1; home.pts += 3; away.losses += 1;
          } else if (a > h) {
            away.wins += 1; away.pts += 3; home.losses += 1;
          } else {
            home.draws += 1; away.draws += 1; home.pts += 1; away.pts += 1;
          }
        });
        const sorted = [...rows.values()].map(row => ({ ...row, gd: row.gf - row.ga }))
          .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
        sorted.forEach((row, index) => {
          row.pos = index + 1;
          row.status = index < 2 ? "Classificado" : (index === 2 ? "Possível 3º" : "Eliminado");
          row.statusClass = index < 2 ? "advance" : (index === 2 ? "possible" : "out");
        });
        group.standings = sorted;
      });
    }

    function resolveParticipant(team, standingsByGroup, matchResults) {
      const label = `${team?.name || ""} ${team?.sourceName || ""}`;
      let match = label.match(/(?:1º|Winner)\s+Grupo?\s*([A-L])/i) || label.match(/Winner Group ([A-L])/i);
      if (match) return standingTeam(standingsByGroup[match[1]], 0);
      match = label.match(/(?:2º|Runner-up)\s+Grupo?\s*([A-L])/i) || label.match(/Runner-up Group ([A-L])/i);
      if (match) return standingTeam(standingsByGroup[match[1]], 1);
      match = label.match(/3(?:º|rd)\s+Grupo\s+([A-L/]+)/i) || label.match(/3rd Group ([A-L/]+)/i);
      if (match) {
        const candidates = match[1].split("/").map(value => value.trim()).filter(Boolean);
        const third = candidates.map(letter => standingTeam(standingsByGroup[letter], 2)).filter(Boolean)
          .sort((a, b) => (b.pts || 0) - (a.pts || 0) || (b.gd || 0) - (a.gd || 0))[0];
        return third;
      }
      match = label.match(/Vencedor Jogo (\d+)/i) || label.match(/Winner Match (\d+)/i);
      if (match) return matchResults.get(Number(match[1]))?.winner || team;
      match = label.match(/Perdedor Jogo (\d+)/i) || label.match(/Loser Match (\d+)/i);
      if (match) return matchResults.get(Number(match[1]))?.loser || team;
      return team;
    }

    function standingTeam(rows, index) {
      const row = rows?.[index];
      if (!row) return null;
      const indexed = state.teamIndex.get(normalize(row.team)) || {};
      return {
        name: row.team,
        sourceName: row.sourceTeam || indexed.sourceName || row.team,
        flag: row.flag || indexed.flag || "",
        idTeam: indexed.idTeam || "",
        idCountry: indexed.idCountry || "",
        pts: Number(row.pts) || 0,
        gd: Number(row.gd) || 0
      };
    }

    function predictScore(home, away, ratings, match = {}) {
      const h = ratings[normalize(home?.name)] || { score: 50, attack: 1.1, defense: 1.1 };
      const a = ratings[normalize(away?.name)] || { score: 50, attack: 1.1, defense: 1.1 };
      const seed = `${match.matchNumber || match.id || ""}:${home?.name || ""}:${away?.name || ""}`;
      const homeHost = homeAdvantage(home, match);
      const awayHost = homeAdvantage(away, match);
      const hAttack = (h.score * .34) + ((h.squadAttack || h.score || 55) * .42) + ((h.formScore || 50) * .10) + ((h.moral || 58) * .08) + ((h.externalPower || h.history || 56) * .06);
      const aAttack = (a.score * .34) + ((a.squadAttack || a.score || 55) * .42) + ((a.formScore || 50) * .10) + ((a.moral || 58) * .08) + ((a.externalPower || a.history || 56) * .06);
      const hGuard = (a.score * .28) + ((a.squadDefense || a.score || 55) * .46) + ((a.squadMoral || a.moral || 58) * .12) + ((a.history || 56) * .08) + ((a.squadScore || a.score || 55) * .06);
      const aGuard = (h.score * .28) + ((h.squadDefense || h.score || 55) * .46) + ((h.squadMoral || h.moral || 58) * .12) + ((h.history || 56) * .08) + ((h.squadScore || h.score || 55) * .06);
      const tempo = clampNumber(.88, 1.12, .98 + (((h.formScore || 50) + (a.formScore || 50) - 100) / 820));
      const hExpected = clampNumber(.22, 2.72, (1.04 * tempo) + ((hAttack - hGuard) / 86) + homeHost + ((h.tacticalAttack || 0) * .018) - ((a.tacticalDefense || 0) * .012));
      const aExpected = clampNumber(.22, 2.72, (1.00 * tempo) + ((aAttack - aGuard) / 88) + awayHost + ((a.tacticalAttack || 0) * .018) - ((h.tacticalDefense || 0) * .012));
      const hDist = poissonDistribution(hExpected, 5);
      const aDist = poissonDistribution(aExpected, 5);
      const matrix = scoreMatrix(hDist, aDist);
      const probs = outcomeProbabilities(matrix);
      const knockout = /Rodada|Oitavas|Quartas|Semifinais|Final/i.test(match.stage || "");
      const picked = representativeScoreline(matrix, h, a, probs, knockout);
      let homeGoals = picked.home;
      let awayGoals = picked.away;
      let penaltyScore = "";
      let penaltyWinner = "";
      if (knockout && homeGoals === awayGoals) {
        const pSeed = seededUnit(`${seed}:pens`);
        const homeEdge = ((h.score || 50) - (a.score || 50)) / 165 + (homeHost - awayHost);
        penaltyWinner = pSeed + homeEdge >= .5 ? "home" : "away";
        const winnerPens = 4 + Math.floor(seededUnit(`${seed}:pw`) * 2);
        const loserPens = Math.max(2, winnerPens - 1 - Math.floor(seededUnit(`${seed}:pl`) * 2));
        penaltyScore = penaltyWinner === "home" ? `${winnerPens}-${loserPens}` : `${loserPens}-${winnerPens}`;
      }
      const shootoutHome = clampNumber(.34, .66, .5 + (((h.score || 50) - (a.score || 50)) / 190) + homeHost - awayHost);
      const homeWin = knockout ? probs.home + (probs.draw * shootoutHome) : probs.home;
      const awayWin = knockout ? probs.away + (probs.draw * (1 - shootoutHome)) : probs.away;
      return {
        home: homeGoals,
        away: awayGoals,
        homeWin: Math.round(homeWin * 100),
        draw: knockout ? 0 : Math.round(probs.draw * 100),
        awayWin: Math.round(awayWin * 100),
        penaltyScore,
        penaltyWinner,
        xgHome: hExpected.toFixed(2),
        xgAway: aExpected.toFixed(2),
        topScores: topScorelines(matrix, 4),
        factors: {
          homeAttack: Math.round(hAttack),
          awayAttack: Math.round(aAttack),
          homeDefense: Math.round(aGuard),
          awayDefense: Math.round(hGuard),
          homeHost: Math.round(homeHost * 100),
          awayHost: Math.round(awayHost * 100)
        }
      };
    }

    function clampNumber(min, max, value) {
      return Math.max(min, Math.min(max, value));
    }

    function poissonDistribution(lambda, maxGoals) {
      const values = [];
      let total = 0;
      for (let goals = 0; goals <= maxGoals; goals += 1) {
        const probability = (Math.exp(-lambda) * (lambda ** goals)) / factorial(goals);
        values.push({ goals, probability });
        total += probability;
      }
      if (total < 1) values[values.length - 1].probability += 1 - total;
      return values;
    }

    function factorial(value) {
      let result = 1;
      for (let index = 2; index <= value; index += 1) result *= index;
      return result;
    }

    function scoreMatrix(homeDist, awayDist) {
      const rows = [];
      homeDist.forEach(home => {
        awayDist.forEach(away => {
          rows.push({
            home: home.goals,
            away: away.goals,
            probability: home.probability * away.probability
          });
        });
      });
      return rows.sort((a, b) => b.probability - a.probability);
    }

    function outcomeProbabilities(matrix) {
      return matrix.reduce((acc, item) => {
        if (item.home > item.away) acc.home += item.probability;
        else if (item.away > item.home) acc.away += item.probability;
        else acc.draw += item.probability;
        return acc;
      }, { home: 0, draw: 0, away: 0 });
    }

    function pickScoreline(matrix, roll) {
      let running = 0;
      for (const item of matrix.slice().sort((a, b) => {
        const weightedA = a.probability + seededUnit(`${a.home}-${a.away}:a`) * .002;
        const weightedB = b.probability + seededUnit(`${b.home}-${b.away}:b`) * .002;
        return weightedB - weightedA;
      })) {
        running += item.probability;
        if (roll <= running) return item;
      }
      return matrix[0] || { home: 1, away: 1 };
    }

    function representativeScoreline(matrix, homeRating, awayRating, probs, knockout) {
      const powerDiff = (homeRating.score || 50) - (awayRating.score || 50);
      const ordered = matrix.slice(0, 12);
      if (!ordered.length) return { home: 1, away: 1 };
      let candidates = ordered;
      if (Math.abs(powerDiff) >= 7) {
        candidates = ordered.filter(item => powerDiff > 0 ? item.home > item.away : item.away > item.home);
      } else if (!knockout && probs.draw >= .24) {
        candidates = ordered.filter(item => item.home === item.away);
      } else if (Math.abs(powerDiff) < 4) {
        candidates = ordered.filter(item => Math.abs(item.home - item.away) <= 1);
      }
      const realistic = (candidates.length ? candidates : ordered)
        .filter(item => item.home + item.away <= 4);
      return realistic[0] || candidates[0] || ordered[0];
    }

    function topScorelines(matrix, count) {
      return matrix.slice(0, count).map(item => ({
        score: `${item.home}-${item.away}`,
        probability: Math.round(item.probability * 100)
      }));
    }

    function goalsFromExpected(expected, roll) {
      const shifted = expected + ((roll - .5) * .78);
      if (shifted < .58) return 0;
      if (shifted < 1.38) return 1;
      if (shifted < 2.20) return 2;
      if (shifted < 2.92) return 3;
      return roll > .88 ? 5 : 4;
    }

    function seededUnit(text) {
      let hash = 2166136261;
      for (let index = 0; index < text.length; index += 1) {
        hash ^= text.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return ((hash >>> 0) % 10000) / 10000;
    }

    function homeAdvantage(team, match) {
      const teamCountry = normalize(team?.idCountry || "");
      const stadiumCountry = normalize(match?.stadiumCountry || "");
      if (teamCountry && stadiumCountry && teamCountry === stadiumCountry) return .006;
      return 0;
    }

    function clampGoals(value) {
      return Math.max(0, Math.min(5, value));
    }

    function strongerTeam(home, away, ratings) {
      const h = ratings[normalize(home?.name)]?.score || 50;
      const a = ratings[normalize(away?.name)]?.score || 50;
      return h >= a ? home : away;
    }

    function hasNumericScore(match) {
      return /^(\d+)\s*-\s*(\d+)/.test(match.score || "");

    function scoreParts(match) {
      const parts = (match.score || "").match(/^(\d+)\s*-\s*(\d+)/);
      return parts ? [Number(parts[1]), Number(parts[2])] : [null, null];
    }

    async function fetchNewsItems() {
      const rssUrl = encodeURIComponent(NEWS_RSS_URL);
      const attempts = [
        async () => {
          const response = await fetchWithTimeout(NEWS_FUNCTION_URL, {}, 3500);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const json = await response.json();
          return (json.items || []).filter(item => item.title && item.link);
        },
        async () => {
          const response = await fetchWithTimeout(`${NEWS_PROXY_URL}${rssUrl}`, {}, 3500);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return parseNewsRss(await response.text());
        },
        async () => {
          const response = await fetchWithTimeout(`https://api.allorigins.win/get?url=${rssUrl}`, {}, 3500);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const json = await response.json();
          return parseNewsRss(json.contents || "");
        },
        async () => {
          const response = await fetchWithTimeout(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`, {}, 3500);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const json = await response.json();
          return (json.items || []).slice(0, 10).map(item => ({
            title: cleanNewsTitle(item.title || ""),
            link: item.link || "",
            source: item.author || "Google Noticias",
            date: formatNewsDate(item.pubDate || "")
          })).filter(item => item.title && item.link);
        }
      ];
      for (const attempt of attempts) {
        try {
          const items = await attempt();
          if (items.length) return items;
        } catch {}
      }
      return [];
    }

    function fetchWithTimeout(url, options = {}, timeoutMs = 3500) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      return fetch(url, { ...options, cache: "no-store", signal: controller.signal })
        .finally(() => clearTimeout(timer));
    }

    function parseNewsRss(text) {
      const xml = new DOMParser().parseFromString(text, "application/xml");
      return [...xml.querySelectorAll("item")].slice(0, 10).map(item => ({
        title: cleanNewsTitle(item.querySelector("title")?.textContent || ""),
        link: item.querySelector("link")?.textContent || "",
        source: item.querySelector("source")?.textContent || "Google Noticias",
        date: formatNewsDate(item.querySelector("pubDate")?.textContent || "")
      })).filter(item => item.title && item.link);
    }

    function cleanNewsTitle(title) {
      return title.replace(/\s+-\s+[^-]+$/, "").trim();

    function formatNewsDate(value) {
      const date = new Date(value);
      if (!Number.isFinite(date.getTime())) return "";
      return new Intl.DateTimeFormat("pt-BR", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }).format(date).replace(".", "");
    }

    function renderBracket() {
      const query = normalize(els.bracketSearch.value);

      els.bracketBoard.style.height = `${Math.max(620, maxY + 150)}px`;
      const rounds = mainRounds.map((round, roundIndex) => {

          .map((match, matchIndex) => ({ match, matchIndex }))

    function getMainBracketRounds() {
      const data = state.viewData || state.data;
      const order = ["Round_of_32", "Round_of_16", "Quarterfinals", "Semifinals", "Final"];
      return orderBracketRounds(order
        .map(id => data.knockout.find(round => round.id === id))
        .filter(Boolean));
    }

    function orderBracketRounds(rounds) {
      const ordered = rounds.map(round => ({ ...round, matches: [...(round.matches || [])] }));
      for (let roundIndex = ordered.length - 1; roundIndex > 0; roundIndex -= 1) {
        const current = ordered[roundIndex].matches;
        const previous = ordered[roundIndex - 1].matches;
        const byNumber = new Map(previous.map(match => [Number(match.matchNumber), match]).filter(([number]) => number));
        const desired = [];
        current.forEach(match => {
          matchDependencies(match).forEach(dep => {
            const source = byNumber.get(Number(dep.matchNumber));
            if (source && !desired.includes(source)) desired.push(source);
          });
        });
        previous.forEach(match => {
          if (!desired.includes(match)) desired.push(match);
        });
        ordered[roundIndex - 1].matches = desired;
      }
      return ordered;
    }

    function getThirdPlaceRound() {
      const data = state.viewData || state.data;
      return data.knockout.find(round => round.id === "Match_for_third_place");
    }

    function bracketX(roundIndex) {
      return 14 + (roundIndex * (224 + 52));
    }

    function bracketY(roundIndex, matchIndex) {
      const head = 52;
      const row = 150;
      const groupSize = 2 ** roundIndex;
      return head + ((matchIndex * groupSize) + ((groupSize - 1) / 2)) * row;
    }

    function matchLayoutKey(match) {
      return match?.matchNumber ? `match:${match.matchNumber}` : `id:${match?.id || ""}`;
    }

    function matchDependencies(match) {
      const deps = Array.isArray(match?.dependsOn) && match.dependsOn.length
        ? match.dependsOn
        : [...participantDependencies(match?.home), ...participantDependencies(match?.away)];
      return uniqueDependencies(deps).filter(dep => dep.type === "winner");
    }

    function computeBracketLayout(rounds) {
      const layout = new Map();
      rounds.forEach((round, roundIndex) => {
        round.matches.forEach((match, matchIndex) => {
          const sources = matchDependencies(match)
            .map(dep => layout.get(`match:${dep.matchNumber}`))
            .filter(Boolean);
          const fallbackY = bracketY(roundIndex, matchIndex);
          const y = sources.length
            ? sources.reduce((sum, pos) => sum + pos.y, 0) / sources.length
            : fallbackY;
          const pos = { x: bracketX(roundIndex), y };
          layout.set(matchLayoutKey(match), pos);
          if (match.matchNumber) layout.set(`match:${match.matchNumber}`, pos);
        });
      });
      return layout;
    }

    function drawBracketLines() {
      const board = els.bracketBoard;
      const svg = document.getElementById("bracketLines");
      if (!board || !svg) return;
      const boardRect = board.getBoundingClientRect();
      const width = Math.max(board.scrollWidth, boardRect.width);
      const height = Math.max(board.scrollHeight, boardRect.height);
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svg.setAttribute("width", width);
      svg.setAttribute("height", height);
      const paths = [];
      const rounds = getMainBracketRounds();
      const card = (roundIndex, matchIndex) => board.querySelector(`.bracket-match[data-round-index="${roundIndex}"][data-match-index="${matchIndex}"]`);
      const cardByNumber = new Map();
      board.querySelectorAll(".bracket-match[data-match-number]").forEach(node => {
        const number = Number(node.getAttribute("data-match-number"));
        if (number) cardByNumber.set(number, node);
      });
      const point = (node, side) => {
        const rect = node.getBoundingClientRect();
        return {
          x: (side === "right" ? rect.right : rect.left) - boardRect.left + board.scrollLeft,
          y: rect.top - boardRect.top + board.scrollTop + (rect.height / 2)
        };
      };
      const addPathNodes = (from, to) => {
        if (!from || !to) return;
        const start = point(from, "right");
        const end = point(to, "left");
        const mid = start.x + ((end.x - start.x) / 2);
        const isNext = from.dataset.matchId === state.selectedMatchId || to.dataset.matchId === state.selectedMatchId;
        paths.push(`<path class="${isNext ? "next" : ""}" d="M ${start.x} ${start.y} H ${mid} V ${end.y} H ${end.x}" />`);
      };
      const addPath = (fromRound, fromIndex, toRound, toIndex) => addPathNodes(card(fromRound, fromIndex), card(toRound, toIndex));
      rounds.forEach((round, roundIndex) => {
        if (roundIndex === 0) return;
        round.matches.forEach((match, matchIndex) => {
          const to = card(roundIndex, matchIndex);
          const deps = matchDependencies(match);
          if (deps.length) {
            deps.forEach(dep => addPathNodes(cardByNumber.get(dep.matchNumber), to));
            return;
          }
          addPath(roundIndex - 1, matchIndex * 2, roundIndex, matchIndex);
          addPath(roundIndex - 1, (matchIndex * 2) + 1, roundIndex, matchIndex);
        });
      });
      if (!paths.length) {
        for (let roundIndex = 0; roundIndex < 3; roundIndex += 1) {
          const count = 16 / (2 ** roundIndex);
          for (let matchIndex = 0; matchIndex < count; matchIndex += 1) {
            addPath(roundIndex, matchIndex, roundIndex + 1, Math.floor(matchIndex / 2));
          }
        }
        addPath(3, 0, 4, 0);
        addPath(3, 1, 4, 0);
      }
      svg.innerHTML = paths.join("");
    }

            ${group.matches.map(match => matchCard(match)).join("")}
          </div>
        </section>
      `).join("");
      bindMatchCards();
    }

    function renderMatches() {
      const filter = els.matchFilter.value;
      const query = normalize(els.matchSearch.value);
      const todayKey = dayKey(Date.now());
      const data = state.viewData || state.data;
      const matches = data.allMatches.filter(match => {
        if (!matchMatchesQuery(match, query)) return false;
        if (filter === "done") return match.isDone;
        if (filter === "upcoming") return !match.isDone;
        if (filter === "today") return match.timestamp && dayKey(match.timestamp) === todayKey;
        return true;
      });
      els.matchesList.innerHTML = matches.length
        ? matches.map(match => matchCard(match)).join("")
        : `<div class="empty">Sem jogos para este filtro.</div>`;
      bindMatchCards();
    }

    function matchCard(match) {
      const active = match.id === state.selectedMatchId ? " active" : "";
      const scoreParts = match.score.match(/^(\d+)\s*-\s*(\d+)/);
      return `
        <button class="match-card${active}" type="button" data-match-id="${escapeAttr(match.id)}">
          <div class="match-meta">
            <span>${escapeHtml(match.stage)}</span>
            <span>${escapeHtml(match.dateDisplay || "")}</span>
          </div>
          <div class="teams">
            <div class="team-row">
              ${teamFlag(match.home)}
              <span class="team-name" ${teamAttrs(match.home)}>${escapeHtml(match.home.name)}</span>
              <span class="score">${scoreParts ? escapeHtml(scoreParts[1]) : ""}</span>
            </div>
            <div class="team-row">
              ${teamFlag(match.away)}
              <span class="team-name" ${teamAttrs(match.away)}>${escapeHtml(match.away.name)}</span>
              <span class="score">${scoreParts ? escapeHtml(scoreParts[2]) : ""}</span>
            </div>
          </div>
          <div class="match-footer">
            <span class="status ${match.statusClass}">${escapeHtml(match.badge || (match.isDone ? match.score : match.label))}</span>
            <span class="watch-link" data-youtube-url="${escapeAttr(cazeTvMatchUrl(match))}">Assistir</span>
          </div>
        </button>
      `;
    }

    function renderDetail() {
      const data = state.viewData || state.data;
      const match = findMatchById(state.selectedMatchId) || findDefaultMatch(data);
      if (!match) {
        els.detailPanel.innerHTML = `<h3>Detalhes do jogo</h3><div class="empty">Nenhum jogo carregado.</div>`;
        return;
      }
      state.selectedMatchId = match.id;
      els.detailPanel.innerHTML = `
        <h3>${escapeHtml(match.home.name)} x ${escapeHtml(match.away.name)}</h3>
        <div class="detail-list">
          ${detailItem("Fase", match.stage)}
          ${detailItem("Status", match.isLive ? `${match.status}: ${match.score}` : (match.isDone ? `Finalizado: ${match.score}` : match.label))}
          ${detailItem("Data e hora", match.dateDisplay || "A definir")}
          ${detailItem("Local", match.venue || "A definir")}
          ${detailItem("Ao vivo", `<a href="${escapeAttr(cazeTvMatchUrl(match))}" target="_blank" rel="noreferrer">Assistir</a>`)}
          ${detailItem("Fonte", match.dataSource === "FIFA" ? `FIFA · ${formatCheckedAt(match.liveUpdatedAt)}` : (match.reportHref ? `<a href="${escapeAttr(match.reportHref)}" target="_blank" rel="noreferrer">ver página do jogo</a>` : "Wikipedia/FIFA"))}
          ${renderModelInsight(match)}
          ${renderScoreEditor(match)}
        </div>
      `;
      const saveButton = els.detailPanel.querySelector("[data-save-score]");
      if (saveButton) {
        saveButton.onclick = () => saveManualScore(saveButton.getAttribute("data-save-score"));
      }
      const clearButton = els.detailPanel.querySelector("[data-clear-score]");
      if (clearButton) {
        clearButton.onclick = () => {
          delete state.simScores[clearButton.getAttribute("data-clear-score")];
          saveSimScores();
          render();
        };
      }
    }

    function renderScoreEditor(match) {
      if (state.mode === "live" || !match.matchNumber) return "";
      const manual = state.simScores[match.matchNumber];
      const [homeScore, awayScore] = manual ? [manual.home, manual.away] : (hasNumericScore(match) ? scoreParts(match) : ["", ""]);
      return `
        <div class="sim-panel">
          <div class="detail-label">Placar manual</div>
          <div class="score-edit" data-score-editor="${match.matchNumber}">
            <label>
              <span>${escapeHtml(match.home.name)}</span>
              <input type="number" min="0" max="15" inputmode="numeric" value="${escapeAttr(homeScore ?? "")}" data-score-side="home" />
            </label>
            <span>x</span>
            <label>
              <span>${escapeHtml(match.away.name)}</span>
              <input type="number" min="0" max="15" inputmode="numeric" value="${escapeAttr(awayScore ?? "")}" data-score-side="away" />
            </label>
            <button class="primary-button" type="button" data-save-score="${match.matchNumber}">Salvar resultado</button>
            <button class="ghost-button" type="button" data-clear-score="${match.matchNumber}">Remover resultado manual</button>
          </div>
        </div>
      `;
    }

    function renderModelInsight(match) {
      const probability = match.probability;
      if (!probability) return "";
      const topScores = (probability.topScores || [])
        .map(item => `<span class="prob-chip"><strong>${escapeHtml(item.score)}</strong>${escapeHtml(item.probability)}%</span>`)
        .join("");
      const drawChip = probability.draw
        ? `<span class="prob-chip">Empate <strong>${escapeHtml(probability.draw)}%</strong></span>`
        : `<span class="prob-chip">Empate decidido nos penaltis</span>`;
      return `
        <div class="detail-item">
          <div class="detail-label">Modelo estatistico</div>
          <div class="model-explain">
            <div class="probability-strip">
              <span class="prob-chip">${escapeHtml(match.home.name)} <strong>${escapeHtml(probability.homeWin)}%</strong></span>
              ${drawChip}
              <span class="prob-chip">${escapeHtml(match.away.name)} <strong>${escapeHtml(probability.awayWin)}%</strong></span>
            </div>
            <div class="probability-strip">
              <span class="prob-chip">xG ${escapeHtml(probability.xgHome)} - ${escapeHtml(probability.xgAway)}</span>
              ${probability.penaltyScore ? `<span class="prob-chip">Penaltis ${escapeHtml(probability.penaltyScore)}</span>` : ""}
            </div>
            <div class="probability-strip">${topScores}</div>

    function detailItem(label, value) {
      return `
        <div class="detail-item">
          <div class="detail-label">${escapeHtml(label)}</div>
          <div class="detail-value">${value}</div>
        </div>

    function renderEmpty(error) {
      els.summary.innerHTML = metric("Dados", "Indisponível", error?.message || "falha ao carregar");
      els.bracketBoard.innerHTML = `<div class="empty">Não foi possível carregar a chave.</div>`;
      els.thirdPlace.innerHTML = "";
      els.groupsGrid.innerHTML = `<div class="empty">Não foi possível carregar os grupos.</div>`;
      els.matchesList.innerHTML = `<div class="empty">Não foi possível carregar os jogos.</div>`;
      els.detailPanel.innerHTML = `<h3>Detalhes do jogo</h3><div class="empty">Sem dados.</div>`;
