<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copa do Mundo 2026 - Chave interativa</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --ink: #1f2933;
      --muted: #5d6b79;
      --line: #d9e2ec;
      --green: #138a5b;
      --green-bg: #dff5e8;
      --blue: #1d5fbf;
      --blue-bg: #e2edff;
      --red: #b83434;
      --red-bg: #ffe7e7;
      --amber: #a96800;
      --amber-bg: #fff0c7;
      --navy: #102033;
      --gold: #d8a728;
      --teal: #0f766e;
      --shadow: 0 18px 50px rgba(31, 41, 51, .10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .top {
      background:
        linear-gradient(135deg, rgba(255,255,255,.96) 0%, rgba(244,249,255,.98) 54%, rgba(231,242,239,.98) 100%);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(31, 41, 51, .06);
    }

    .top-inner {
      max-width: 1500px;
      margin: 0 auto;
      padding: 14px 18px 10px;
      display: grid;
      gap: 12px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand img {
      width: 48px;
      height: 56px;
      object-fit: contain;
      flex: 0 0 auto;
      padding: 2px;
      border-radius: var(--radius);
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 8px 22px rgba(31, 41, 51, .10);
    }

    .eyebrow {
      margin: 0 0 1px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 2.6vw, 30px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .sync {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      text-align: right;
    }

    .primary-button {
      border: 0;
      background: var(--ink);
      color: #fff;
      border-radius: var(--radius);
      padding: 9px 13px;
      min-height: 38px;
    }

    .primary-button:disabled {
      opacity: .62;
      cursor: wait;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 99px;
      background: var(--amber);
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.ok {
      background: var(--green);
    }

    .status-dot.bad {
      background: var(--red);
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow: auto;
      padding-bottom: 2px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--ink);
      border-radius: var(--radius);
      padding: 8px 12px;
      min-height: 36px;
      white-space: nowrap;
    }

    .tab[aria-selected="true"] {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    main {
      max-width: 1500px;
      width: 100%;
      margin: 0 auto;
      padding: 18px;
    }

    .cover {
      margin-bottom: 16px;
    }

    .cover-grid {
      min-height: 380px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 14px;
    }

    .cover-hero,
    .cover-news {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .cover-hero {
      position: relative;
      min-height: 380px;
      display: grid;
      align-content: end;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(16,32,51,.18), rgba(16,32,51,.86)),
        #1f2933;
    }

    .cover-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .cover-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg, rgba(16,32,51,.08), rgba(16,32,51,.88));
    }

    .cover-hero-inner {
      position: relative;
      z-index: 2;
      padding: 28px;
      display: grid;
      gap: 18px;
    }

    .cover-kicker {
      margin: 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.76);
    }

    .cover-title {
      margin: 0;
      max-width: 780px;
      font-size: clamp(28px, 4vw, 54px);
      line-height: .98;
      letter-spacing: 0;
    }

    .cover-subtitle {
      margin: 0;
      max-width: 720px;
      color: rgba(255,255,255,.82);
      font-size: 15px;
    }

    .cover-match-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .cover-match {
      border: 1px solid rgba(255,255,255,.22);
      border-radius: var(--radius);
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
      padding: 12px;
      display: grid;
      gap: 7px;
      min-height: 118px;
    }

    .cover-match span,
    .cover-match small {
      color: rgba(255,255,255,.78);
    }

    .cover-match strong {
      font-size: 16px;
      line-height: 1.18;
    }

    .cover-news {
      background: var(--surface);
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 380px;
    }

    .cover-news-head {
      padding: 16px 16px 10px;
      border-bottom: 1px solid var(--line);
    }

    .cover-news-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .cover-news-head p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .news-list {
      padding: 8px 14px 12px;
      display: grid;
      align-content: start;
      gap: 8px;
      max-height: 288px;
      overflow: auto;
    }

    .news-item {
      display: grid;
      gap: 3px;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      color: inherit;
      text-decoration: none;
    }

    .news-item:last-child {
      border-bottom: 0;
    }

    .news-item strong {
      font-size: 13px;
      line-height: 1.25;
    }

    .news-item span {
      color: var(--muted);
      font-size: 11px;
    }

    .news-actions {
      padding: 10px 14px 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
    }

    .link-pill,
    .youtube-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      text-decoration: none;
      min-height: 28px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 650;
    }

    .youtube-pill {
      border-color: rgba(184,52,52,.22);
      background: var(--red-bg);
      color: var(--red);
    }

    .match-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      min-height: 24px;
    }

    .watch-link {
      border: 0;
      background: transparent;
      color: var(--blue);
      font-size: 12px;
      font-weight: 760;
      padding: 2px 0;
      text-decoration: underline;
      text-underline-offset: 2px;
      white-space: nowrap;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px;
      min-height: 82px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .metric .value {
      font-size: 22px;
      font-weight: 760;
      line-height: 1.1;
    }

    .metric .note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 12px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 9px 10px;
      min-height: 38px;
      min-width: min(280px, 100%);
    }

    .select {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 9px 10px;
      min-height: 38px;
    }

    .ghost-button,
    .mode-button,
    .icon-button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: var(--radius);
      min-height: 38px;
      padding: 8px 11px;
    }

    .mode-toggle {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
    }

    .mode-button {
      border: 0;
      border-radius: 0;
      border-right: 1px solid var(--line);
      white-space: nowrap;
    }

    .mode-button:last-child {
      border-right: 0;
    }

    .mode-button[aria-pressed="true"] {
      background: var(--blue);
      color: #fff;
    }

    .bracket-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 14px;
      align-items: start;
    }

    .bracket-shell {
      min-width: 0;
    }

    .bracket-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      position: sticky;
      left: 0;
      z-index: 4;
      width: max-content;
      max-width: 100%;
      background: rgba(244, 247, 251, .94);
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
    }

    .icon-button {
      width: 38px;
      padding: 0;
      font-size: 18px;
      font-weight: 760;
    }

    #zoomLabel {
      min-width: 48px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .bracket-scroll {
      overflow: auto;
      padding-bottom: 12px;
      max-height: calc(100vh - 230px);
      min-height: 520px;
      cursor: grab;
      overscroll-behavior: contain;
      scrollbar-gutter: stable both-edges;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #eef3f8;
      touch-action: pan-x pan-y;
    }

    .bracket-scroll.dragging {
      cursor: grabbing;
      user-select: none;
    }

    .bracket-canvas {
      width: max-content;
      transform-origin: top left;
      transition: transform .12s ease;
    }

    .bracket-board {
      --card-w: 224px;
      --col-gap: 52px;
      --row-h: 150px;
      --card-h: 96px;
      --head-h: 52px;
      position: relative;
      min-width: 1356px;
      height: 2470px;
      padding: 0 14px 18px;
      background:
        linear-gradient(90deg, rgba(16, 32, 51, .04) 0 224px, transparent 224px 276px, rgba(15, 118, 110, .045) 276px 500px, transparent 500px 552px, rgba(29, 95, 191, .045) 552px 776px, transparent 776px 828px, rgba(216, 167, 40, .055) 828px 1052px, transparent 1052px 1104px, rgba(19, 138, 91, .06) 1104px 1328px),
        linear-gradient(180deg, rgba(255, 255, 255, .92), rgba(255, 255, 255, .66));
      border: 0;
      border-radius: var(--radius) var(--radius) 0 0;
      box-shadow: none;
    }

    .bracket-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .bracket-lines path {
      fill: none;
      stroke: #8ba9ca;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .78;
    }

    .bracket-lines path.next {
      stroke: var(--gold);
      stroke-width: 4;
      opacity: 1;
      filter: drop-shadow(0 2px 3px rgba(216, 167, 40, .25));
    }

    .stage-title {
      position: absolute;
      top: 12px;
      left: var(--x);
      width: var(--card-w);
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fafc;
      color: var(--ink);
      font-weight: 760;
    }

    .stage-title span:last-child {
      color: var(--muted);
      font-size: 12px;
      font-weight: 540;
    }

    .bracket-match {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--card-w);
      min-height: var(--card-h);
      z-index: 2;
    }

    .match-card.bracket-match {
      width: var(--card-w);
    }

    .bracket-match.final {
      border-color: rgba(19, 138, 91, .45);
      box-shadow: 0 14px 30px rgba(19, 138, 91, .14);
    }

    .model-explain {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
    }

    .probability-strip,
    .data-source-row,
    .lineup-controls,
    .lineup-impact,
    .bench-tools {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
    }

    .prob-chip,
    .data-badge,
    .impact-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      color: var(--muted);
      background: #fff;
    }

    .prob-chip strong,
    .impact-pill strong {
      color: var(--ink);
    }

    .data-badge.real {
      color: var(--green);
      background: var(--green-bg);
      border-color: rgba(19, 138, 91, .18);
    }

    .data-badge.estimate {
      color: var(--amber);
      background: var(--amber-bg);
      border-color: rgba(169, 104, 0, .18);
    }

    .factor-list {
      display: grid;
      gap: 6px;
    }

    .factor-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) 36px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .factor-bar {
      height: 7px;
      border-radius: 99px;
      background: var(--surface-2);
      overflow: hidden;
    }

    .factor-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--blue));
    }

    .third-place {
      min-width: 1356px;
      margin-top: 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      grid-template-columns: 180px minmax(220px, 340px) 1fr;
      gap: 12px;
      align-items: center;
    }

    .third-place-title {
      font-weight: 760;
    }

    .third-place-note {
      color: var(--muted);
      font-size: 12px;
    }

    .sim-panel {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .score-edit {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
    }

    .score-edit input {
      width: 58px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px;
      text-align: center;
      font-weight: 760;
    }

    .score-edit span {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .score-edit button {
      grid-column: 1 / -1;
    }

    .model-grid {
      display: grid;
      grid-template-columns: minmax(280px, 420px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .model-panel,
    .rating-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
    }

    .rating-list {
      display: grid;
      gap: 8px;
      max-height: 680px;
      overflow: auto;
    }

    .rating-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
    }

    .rating-bar {
      grid-column: 1 / -1;
      height: 7px;
      background: var(--surface-2);
      border-radius: 99px;
      overflow: hidden;
    }

    .rating-bar span {
      display: block;
      height: 100%;
      background: var(--blue);
    }

    .rating-row .factor-list {
      grid-column: 1 / -1;
    }

    .projection-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .round {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 520px;
      display: flex;
      flex-direction: column;
    }

    .round-title {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-weight: 750;
    }

    .round-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 520;
    }

    .round-games {
      padding: 10px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .match-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
      text-align: left;
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
      width: 100%;
      min-height: 96px;
      border-left: 4px solid transparent;
      box-shadow: 0 8px 18px rgba(31, 41, 51, .05);
    }

    .match-card:hover,
    .match-card.active {
      border-color: var(--blue);
      border-left-color: var(--blue);
      box-shadow: 0 10px 24px rgba(29, 95, 191, .14);
      transform: translateY(-1px);
    }

    .match-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .teams {
      display: grid;
      gap: 6px;
    }

    .team-row {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      gap: 7px;
      align-items: center;
      min-height: 24px;
    }

    .team-name[data-team-key],
    .flag-click[data-team-key] {
      cursor: pointer;
      border-radius: 6px;
      padding: 2px 4px;
    }

    .team-name[data-team-key]:hover,
    .flag-click[data-team-key]:hover {
      background: var(--surface-2);
    }

    .flag-click {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 29px;
      min-width: 29px;
      min-height: 22px;
    }

    .flag {
      width: 23px;
      height: 16px;
      object-fit: cover;
      border: 1px solid rgba(0, 0, 0, .12);
      background: #f8fafc;
    }

    .team-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 630;
    }

    .score {
      font-weight: 760;
      min-width: 44px;
      text-align: right;
    }

    .status {
      display: inline-flex;
      align-items: center;
      width: max-content;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      border: 1px solid transparent;
    }

    .status.done {
      color: var(--green);
      background: var(--green-bg);
      border-color: rgba(19, 138, 91, .18);
    }

    .status.pending {
      color: var(--amber);
      background: var(--amber-bg);
      border-color: rgba(169, 104, 0, .18);
    }

    .status.live {
      color: var(--blue);
      background: var(--blue-bg);
      border-color: rgba(29, 95, 191, .18);
    }

    .detail {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 126px;
    }

    .detail h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .detail-list {
      display: grid;
      gap: 10px;
    }

    .detail-item {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .detail-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .detail-value {
      font-weight: 650;
    }

    .group-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .group-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .group-card h3 {
      margin: 0;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 9px 8px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }

    th:first-child,
    td:first-child,
    th:nth-child(2),
    td:nth-child(2) {
      text-align: left;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
      background: #f8fafc;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .team-cell {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 220px;
    }

    .tag {
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      line-height: 1.4;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #fff;
    }

    .tag.advance {
      color: var(--green);
      background: var(--green-bg);
      border-color: rgba(19, 138, 91, .18);
    }

    .tag.possible {
      color: var(--blue);
      background: var(--blue-bg);
      border-color: rgba(29, 95, 191, .18);
    }

    .tag.out {
      color: var(--red);
      background: var(--red-bg);
      border-color: rgba(184, 52, 52, .18);
    }

    .fixtures {
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      background: #fbfdff;
    }

    .games-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .empty {
      background: var(--surface);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 18px;
      color: var(--muted);
    }

    .source {
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .source a {
      color: var(--blue);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(31, 41, 51, .42);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .modal-backdrop[hidden] {
      display: none;
    }

    .team-modal {
      width: min(1180px, 100%);
      max-height: min(820px, calc(100vh - 36px));
      overflow: auto;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: 0 30px 80px rgba(31, 41, 51, .26);
      position: relative;
      padding: 18px;
      border-top: 5px solid var(--green);
    }

    .modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      width: 36px;
      height: 36px;
      font-size: 22px;
      line-height: 1;
    }

    .team-modal-head {
      display: flex;
      gap: 12px;
      align-items: center;
      padding-right: 44px;
      margin-bottom: 14px;
    }

    .team-crest {
      width: 70px;
      height: 70px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #ffffff, #edf4fb);
      border: 1px solid var(--line);
      box-shadow: 0 12px 28px rgba(31, 41, 51, .12);
      flex: 0 0 auto;
    }

    .team-crest img,
    .team-crest .flag {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border: 0;
      box-shadow: none;
      background: transparent;
    }

    .team-identities {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .confed-crest {
      width: 70px;
      height: 70px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #ffffff, #eef4fb);
      color: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 12px 28px rgba(31, 41, 51, .16);
      text-align: center;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: .04em;
      overflow: hidden;
      position: relative;
    }

    .confed-crest span {
      position: absolute;
      inset: auto 4px 5px;
      border-radius: 999px;
      padding: 2px 5px;
      background: rgba(16, 32, 51, .82);
      color: #fff;
    }

    .confed-crest small {
      display: none;
      font-size: 9px;
      font-weight: 600;
      opacity: .78;
      letter-spacing: 0;
    }

    .confed-logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
      display: block;
    }

    .team-modal-head .flag {
      width: 52px;
      height: 34px;
      border-radius: 4px;
    }

    .team-modal-grid {
      display: grid;
      grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
      gap: 14px;
    }

    @media (min-width: 1121px) {
      .lineup-panel {
        position: sticky;
        top: 0;
        align-self: start;
        max-height: calc(100vh - 150px);
        overflow: auto;
        padding-right: 2px;
      }

      .roster-panel {
        min-width: 0;
      }
    }

    .team-model-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .team-model-cell {
      border: 1px solid var(--line);
      background: #fbfdff;
      border-radius: var(--radius);
      padding: 9px;
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .team-model-cell span {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .team-model-cell strong {
      font-size: 18px;
      line-height: 1.1;
    }

    .lineup-controls {
      justify-content: space-between;
      margin: 7px 0 8px;
    }

    .formation-field {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .formation-select {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 7px 8px;
      min-height: 34px;
      color: var(--ink);
    }

    .lineup-impact {
      margin: 0 0 10px;
    }

    .selected-slot {
      color: var(--blue);
      background: var(--blue-bg);
      border-color: rgba(29, 95, 191, .18);
    }

    .pitch-wrap {
      display: grid;
      gap: 8px;
    }

    .pitch {
      min-height: 440px;
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(255,255,255,.18) 50%, transparent 50%),
        repeating-linear-gradient(0deg, #17834f 0 64px, #137747 64px 128px);
      border: 2px solid rgba(255,255,255,.82);
      position: relative;
      overflow: hidden;
    }

    .pitch.editing {
      cursor: grab;
    }

    .pitch::before,
    .pitch::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      border: 2px solid rgba(255,255,255,.72);
    }

    .pitch::before {
      top: 8px;
      height: 70px;
    }

    .pitch::after {
      bottom: 8px;
      height: 70px;
    }

    .player-dot {
      position: absolute;
      transform: translate(-50%, -50%);
      min-width: 52px;
      max-width: 82px;
      display: grid;
      justify-items: center;
      gap: 3px;
      color: #fff;
      text-align: center;
      font-size: 10px;
      text-shadow: 0 1px 2px rgba(0,0,0,.45);
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .player-dot:hover strong {
      outline: 3px solid rgba(255,255,255,.42);
    }

    .player-dot.dragging {
      opacity: .78;
      cursor: grabbing;
    }

    .player-dot strong {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 99px;
      background: #fff;
      color: var(--ink);
      text-shadow: none;
      box-shadow: 0 4px 10px rgba(0,0,0,.25);
    }

    .player-dot.active strong {
      outline: 3px solid #f5c542;
      box-shadow: 0 0 0 6px rgba(245, 197, 66, .28), 0 4px 10px rgba(0,0,0,.25);
    }

    .player-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .player-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px;
      background: #fbfdff;
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 8px;
      text-align: left;
      width: 100%;
      color: inherit;
    }

    .player-card:hover {
      border-color: #9bb8d8;
      background: #f5f9ff;
    }

    .player-card.selected {
      border-color: var(--green);
      background: #f2fbf6;
    }

    .sub-button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 5px 7px;
      width: max-content;
      font-size: 12px;
      color: var(--ink);
    }

    .sub-button:hover {
      border-color: var(--blue);
    }

    .replace-control {
      display: grid;
      gap: 4px;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .replace-control select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      min-height: 30px;
      padding: 4px 6px;
      color: var(--ink);
    }

    .player-photo {
      width: 54px;
      height: 54px;
      border-radius: var(--radius);
      object-fit: contain;
      object-position: center top;
      background: var(--surface-2);
      border: 1px solid var(--line);
      padding: 2px;
    }

    .player-photo-button {
      border: 0;
      background: transparent;
      padding: 0;
      width: 54px;
      height: 54px;
    }

    .player-photo-button:hover .player-photo {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(29, 95, 191, .12);
    }

    .player-photo.placeholder {
      display: grid;
      place-items: center;
      font-weight: 760;
      color: var(--muted);
    }

    .player-card-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .player-card strong {
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .player-detail {
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .player-detail .player-photo {
      width: 88px;
      height: 88px;
      padding: 3px;
    }

    .player-detail h3 {
      margin: 0 0 2px;
      font-size: 20px;
    }

    .player-detail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-top: 10px;
    }

    .player-attribute {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 7px;
      display: grid;
      gap: 2px;
    }

    .player-attribute span {
      color: var(--muted);
      font-size: 11px;
    }

    .player-attribute strong {
      font-size: 16px;
    }

    .photo-lightbox {
      position: fixed;
      inset: 0;
      z-index: 160;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(16,32,51,.72);
    }

    .photo-lightbox[hidden] {
      display: none;
    }

    .photo-frame {
      position: relative;
      max-width: min(92vw, 520px);
      width: 100%;
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }

    .photo-frame img {
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      object-position: center top;
      background: var(--surface-2);
      border-radius: var(--radius);
    }

    .photo-caption {
      margin: 0;
      font-weight: 760;
    }

    @media (max-width: 1120px) {
      .cover-grid {
        grid-template-columns: 1fr;
      }

      .cover-match-grid {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .bracket-layout {
        grid-template-columns: 1fr;
      }

      .detail {
        position: static;
      }

      .group-grid,
      .games-list {
        grid-template-columns: 1fr;
      }

      .fixtures {
        grid-template-columns: 1fr;
      }

      .third-place {
        grid-template-columns: 1fr;
      }

      .model-grid,
      .team-modal-grid,
      .projection-list {
        grid-template-columns: 1fr;
      }

      .team-model-strip,
      .player-detail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .factor-row {
        grid-template-columns: 78px minmax(0, 1fr) 32px;
      }
    }

    @media (max-width: 680px) {
      .toolbar,
      .panel-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .sync {
        justify-content: flex-start;
        text-align: left;
      }

      main {
        padding: 12px;
      }

      .cover-hero,
      .cover-news {
        min-height: 0;
      }

      .cover-hero-inner {
        padding: 20px;
      }

      .cover-match-grid {
        gap: 8px;
      }

      .top-inner {
        padding-inline: 12px;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .brand img {
        width: 34px;
        height: 42px;
      }

      .search,
      .select,
      .primary-button {
        width: 100%;
      }

      .filters {
        width: 100%;
      }

      .mode-toggle,
      .filters > *,
      .bracket-tools {
        width: 100%;
      }

      .mode-button {
        flex: 1;
        padding-inline: 7px;
      }

      .bracket-scroll {
        max-height: calc(100vh - 250px);
        min-height: 430px;
      }

      .match-card {
        min-height: 88px;
        padding: 8px;
      }

      .team-name {
        font-size: 13px;
      }

      .player-list {
        grid-template-columns: 1fr;
      }

      .team-model-strip,
      .player-detail,
      .player-detail-grid {
        grid-template-columns: 1fr;
      }

      .team-modal {
        padding: 14px;
      }

      .team-modal-head {
        align-items: flex-start;
      }

      .team-identities {
        flex-direction: column;
        gap: 6px;
      }

      .team-crest,
      .confed-crest {
        width: 56px;
        height: 56px;
        border-radius: 12px;
      }

      .confed-logo {
        width: 40px;
        height: 40px;
      }

      .lineup-controls {
        align-items: stretch;
      }

      .formation-field,
      .formation-select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="top-inner">
        <div class="toolbar">
          <div class="brand">
            <img alt="Logo da Copa do Mundo FIFA 2026" src="https://upload.wikimedia.org/wikipedia/en/1/17/2026_FIFA_World_Cup_emblem.svg" referrerpolicy="no-referrer" />
            <div>
              <p class="eyebrow">Copa do Mundo FIFA 2026</p>
              <h1>Chave interativa e grupos</h1>
            </div>
          </div>
          <div class="sync">
            <button class="primary-button" id="refreshButton" type="button">Atualizar agora</button>
            <div id="syncStatus"><span class="status-dot"></span>checando dados</div>
          </div>
        </div>
        <nav class="tabs" aria-label="Vistas">
          <button class="tab" type="button" data-view-button="home" aria-selected="true">Home</button>
          <button class="tab" type="button" data-view-button="bracket" aria-selected="false">Mata-mata</button>
          <button class="tab" type="button" data-view-button="groups" aria-selected="false">Grupos</button>
          <button class="tab" type="button" data-view-button="matches" aria-selected="false">Jogos</button>
          <button class="tab" type="button" data-view-button="model" aria-selected="false">Estatística</button>
        </nav>
      </div>
    </header>

    <main>
      <section class="view active" id="view-home">
        <section class="cover" id="cover"></section>
        <section class="summary" id="summary"></section>
      </section>

      <section class="view" id="view-bracket">
        <div class="panel-head">
          <h2>Mata-mata</h2>
          <div class="filters">
            <div class="mode-toggle" role="group" aria-label="Modo da chave">
              <button class="mode-button" type="button" data-mode="live" aria-pressed="true">Real</button>
              <button class="mode-button" type="button" data-mode="sim" aria-pressed="false">Simulação</button>
              <button class="mode-button" type="button" data-mode="model" aria-pressed="false">Estatística</button>
            </div>
            <button class="ghost-button" id="projectButton" type="button">Projetar</button>
            <button class="ghost-button" id="resetSimButton" type="button">Limpar</button>
            <input class="search" id="bracketSearch" placeholder="Filtrar por seleção" autocomplete="off" />
          </div>
        </div>
        <div class="bracket-layout">
          <div class="bracket-shell">
            <div class="bracket-tools">
              <button class="icon-button" id="zoomOutButton" type="button" title="Diminuir zoom">-</button>
              <span id="zoomLabel">100%</span>
              <button class="icon-button" id="zoomInButton" type="button" title="Aumentar zoom">+</button>
              <button class="ghost-button" id="fitButton" type="button">Ajustar</button>
            </div>
            <div class="bracket-scroll" id="bracketViewport">
              <div class="bracket-canvas" id="bracketCanvas">
                <div class="bracket-board" id="bracketBoard"></div>
                <div class="third-place" id="thirdPlace"></div>
              </div>
            </div>
          </div>
          <aside class="detail" id="detailPanel"></aside>
        </div>
      </section>

      <section class="view" id="view-groups">
        <div class="panel-head">
          <h2>Grupos</h2>
          <div class="filters">
            <select class="select" id="groupFilter" aria-label="Grupo">
              <option value="all">Todos os grupos</option>
            </select>
          </div>
        </div>
        <div class="group-grid" id="groupsGrid"></div>
      </section>

      <section class="view" id="view-matches">
        <div class="panel-head">
          <h2>Jogos</h2>
          <div class="filters">
            <select class="select" id="matchFilter" aria-label="Filtro de jogos">
              <option value="all">Todos</option>
              <option value="today">Hoje</option>
              <option value="upcoming">Próximos</option>
              <option value="done">Finalizados</option>
            </select>
            <input class="search" id="matchSearch" placeholder="Buscar seleção, fase ou cidade" autocomplete="off" />
          </div>
        </div>
        <div class="games-list" id="matchesList"></div>
      </section>

      <section class="view" id="view-model">
        <div class="panel-head">
          <h2>Estatística</h2>
          <div class="filters">
            <button class="primary-button" id="modelProjectButton" type="button">Recalcular projeção</button>
            <button class="ghost-button" id="modelResetButton" type="button">Limpar palpites</button>
          </div>
        </div>
        <div class="model-grid" id="modelGrid"></div>
      </section>

      <p class="source">
        Dados carregados da <a href="https://en.wikipedia.org/wiki/2026_FIFA_World_Cup" target="_blank" rel="noreferrer">Wikipedia</a>, da <a href="https://en.wikipedia.org/wiki/2026_FIFA_World_Cup_squads" target="_blank" rel="noreferrer">lista de elencos</a> e da <a href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/standings" target="_blank" rel="noreferrer">FIFA</a> para tabelas, placares e elencos. Horários convertidos para Brasília.
      </p>
    </main>
  </div>

  <div class="modal-backdrop" id="teamModal" hidden>
    <section class="team-modal" role="dialog" aria-modal="true" aria-labelledby="teamModalTitle">
      <button class="modal-close" id="teamModalClose" type="button" aria-label="Fechar">×</button>
      <div id="teamModalBody"></div>
    </section>
  </div>

  <div class="photo-lightbox" id="photoLightbox" hidden>
    <div class="photo-frame">
      <button class="modal-close" id="photoLightboxClose" type="button" aria-label="Fechar">x</button>
      <img id="photoLightboxImg" alt="" />
      <p class="photo-caption" id="photoLightboxCaption"></p>
    </div>
  </div>

  <script>
    const API_URL = "https://en.wikipedia.org/w/api.php?action=parse&page=2026_FIFA_World_Cup&prop=text&format=json&origin=*";
